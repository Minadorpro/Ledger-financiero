   DEUDAS
   ========================================================================= */
function DebtsView({ debts, accounts, onAdd, onEdit, onDelete, onPay, onUndo, onFinish, onMarkCyclePaid, totalMonthly, activeCount, notStarted }) {
  const [q, setQ] = useState('');
  const [filter, setFilter] = useState('activas');
  const filtered = debts.filter(d => {
    if (filter==='activas' && d.finished) return false;
    if (filter==='finalizadas' && !d.finished) return false;
    return d.name.toLowerCase().includes(q.toLowerCase());
  }).map(d => ({ ...d, _daysUntil: d.finished ? Infinity : nextDebtOccurrence(d).daysUntil }))
    .sort((a,b) => a._daysUntil - b._daysUntil);
  return (
    <div className="flex flex-col gap-5">
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
        <MiniKpi label="Deudas / mes" value={fmt(totalMonthly)} sub="Lo que aplica este mes" accent={COLORS.debt} icon={<ICard size={13}/>}/>
        <MiniKpi label="Activas" value={activeCount} sub="Deuda(s) en curso" accent={COLORS.gold} icon={<IWallet size={13}/>}/>
        <MiniKpi label="No cuentan este mes" value={notStarted ? notStarted.length : 0} sub={notStarted && notStarted.length>0 ? `${notStarted.map(d=>d.name).join(', ')}` : 'Todas cuentan'} accent={COLORS.sub} icon={<ICalendar size={13}/>}/>
      </div>
      <div className="flex flex-wrap items-center gap-3">
        <div className="relative flex-1 min-w-[200px]">
          <ISearch size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 dark:text-gray-500"/>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar deuda…" className={inputCls+" pl-9"}/>
        </div>
        <div className="flex gap-2">
          <Pill active={filter==='activas'} onClick={()=>setFilter('activas')} color={COLORS.debt}>Activas</Pill>
          <Pill active={filter==='finalizadas'} onClick={()=>setFilter('finalizadas')} color={COLORS.debt}>Finalizadas</Pill>
          <Pill active={filter==='todas'} onClick={()=>setFilter('todas')} color={COLORS.debt}>Todas</Pill>
        </div>
      </div>
      {filtered.length===0 && <EmptyState text="No hay deudas que coincidan. Añade una nueva para empezar a hacer seguimiento." onAdd={onAdd} cta="Añadir deuda"/>}
      <Collapsible title="Deudas" count={filtered.length}>
      <div className="grid sm:grid-cols-2 gap-4">
        {filtered.map(d => {
          const paid = effectivePaid(d);
          const pct = d.noEndDate ? null : Math.round((paid/d.totalInstallments)*100);
          const pending = d.noEndDate ? d.totalValue : (d.totalInstallments-paid)*d.monthlyPayment;
          const daysUntil = d.finished ? null : nextDebtOccurrence(d).daysUntil;
          const nextDate = d.finished ? null : nextDebtOccurrence(d).date;
          const cyclePaid = d.noEndDate && !d.finished && isPaidThisCycle(d);
          const nowD = new Date();
          // ¿está cubierta la cuota que toca este mes?
          const monthPaid = d.finished ? false : (d.noEndDate
            ? cyclePaid
            : (() => {
                const idx = installmentIndexAt(d, nowD.getFullYear(), nowD.getMonth());
                return idx > 0 && idx <= effectivePaid(d);
              })());
          const overdueDebt = !d.finished && d.mode!=='auto' && !monthPaid
            && debtStarted(d)
            && nowD.getDate() > clampDay(d.paymentDay, nowD.getFullYear(), nowD.getMonth());
          // "Pagado" solo se muestra el día exacto en que se marcó/pagó (auto: el mismo día del cargo;
          // manual: el día que se hizo clic en "marcar"). El resto de días muestra el conteo normal.
          const paidToday = d.mode==='auto'
            ? (daysUntil===0 && monthPaid)
            : (d.noEndDate ? d.lastPaid===todayISO() : d.lastInstallmentMarkedAt===todayISO());
          return (
            <div key={d.id} className="bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500/70 rounded-2xl p-5 shadow-soft flex flex-col gap-3 animate-fadein">
              <div className="flex items-start justify-between">
                <div className="flex items-center gap-3">
                  <span className="text-2xl">{d.emoji}</span>
                  <div>
                    <div className="font-medium text-ink-900 dark:text-gray-100 flex items-center gap-2">
                      {d.name}
                      <span className="flex items-center gap-1 text-[10px] uppercase text-gray-500 border border-paper-300 dark:border-ink-500 rounded-full px-1.5 py-0.5">
                        {d.mode==='auto' ? <><IBolt size={10}/> Auto</> : <><IHand size={10}/> Manual</>}
                      </span>
                      <AccountBadge accountId={d.accountId} accounts={accounts}/>
                    </div>
                    <div className="text-gray-500 dark:text-gray-500">{nextDate ? `Próx. pago: ${nextDate.toLocaleDateString('es-ES',{day:'numeric',month:'short'})}` : `Día ${d.paymentDay} de cada mes`} · {fmt(d.monthlyPayment)}/mes{d.noEndDate && ' · Sin fecha límite'}</div>
                  </div>
                </div>
                <div className="flex flex-col items-end gap-1.5">
                  <div className="flex gap-1">
                    <button onClick={()=>onEdit(d)} className="p-1.5 text-gray-500 hover:text-ink-900 dark:hover:text-gray-200 transition"><IEdit size={16}/></button>
                    <button onClick={()=>onDelete(d)} className="p-1.5 text-gray-500 dark:text-gray-500 hover:text-red-400 transition"><ITrash size={16}/></button>
                  </div>
                  {daysUntil!==null && <DueCountdown daysUntil={daysUntil} paid={monthPaid} paidToday={paidToday}/>}
                </div>
              </div>

              {!d.noEndDate && <TickBar filled={paid} total={d.totalInstallments}/>}

              <div className="flex items-center justify-between text-gray-500 dark:text-gray-500">
                {d.noEndDate ? (
                  <span className="font-mono">Saldo actual</span>
                ) : (
                  <span className="font-mono">{pct}% · {paid} de {d.totalInstallments} cuotas pagadas</span>
                )}
                <span className="font-mono text-gray-500 dark:text-gray-400">{d.noEndDate ? fmt(pending) : `Pendiente: ${fmt(pending)}`}</span>
              </div>

              {overdueDebt && (
                <div className="flex items-center gap-1.5 text-orange-500 text-xs bg-orange-500/10 rounded-lg px-2 py-1.5">
                  <IBell size={13}/> Atrasado: no marcaste la cuota de {MESES[new Date().getMonth()].toLowerCase()}
                </div>
              )}

              {d.finished ? (
                <div className="flex items-center gap-2 text-sm mt-1"><ICheck size={16}/> Finalizada el {d.finishedDate}</div>
              ) : d.noEndDate ? (
                <div className="flex flex-col gap-2 mt-1">
                  {d.mode==='auto' ? (
                    <div className="text-xs text-gray-500 flex items-center gap-1.5"><IBolt size={13} className="text-gold-500"/> Se actualiza sola según la fecha de pago.</div>
                  ) : isPaidThisCycle(d) ? (
                    <div className="flex items-center gap-1.5 text-emerald-400 text-xs"><ICheck size={13}/> Pagado este ciclo</div>
                  ) : (
                    <button onClick={()=>onMarkCyclePaid(d.id)} className="flex items-center justify-center gap-1.5 bg-gold-500 hover:bg-gold-600 text-ink-900 text-xs font-medium px-3 py-1.5 rounded-lg transition">
                      <ICheck size={13}/> Marcar como pagado
                    </button>
                  )}
                  <button onClick={()=>onFinish(d.id)} className="flex items-center justify-center gap-1.5 text-gray-500 hover:text-gold-500 text-xs border border-paper-300 dark:border-ink-500 py-2 rounded-lg transition">
                    Marcar como saldada por completo
                  </button>
                </div>
              ) : d.mode==='auto' ? (
                <div className="text-xs text-gray-500 flex items-center gap-1.5 mt-1"><IBolt size={13} className="text-gold-500"/> Se actualiza sola según la fecha de pago.</div>
              ) : monthPaid ? (
                <div className="flex items-center justify-between gap-2 mt-1">
                  <span className="flex items-center gap-1.5 text-emerald-400 text-xs"><ICheck size={13}/> Cuota de este mes pagada</span>
                  {paidToday && <button onClick={()=>onUndo(d.id)} className="px-3 py-1.5 rounded-lg text-xs text-gray-500 dark:text-gray-400 hover:bg-paper-200 dark:hover:bg-ink-600 transition">Deshacer</button>}
                </div>
              ) : (
                <div className="flex gap-2 mt-1">
                  <button onClick={()=>onPay(d.id)} className="flex-1 flex items-center justify-center gap-1.5 bg-gold-500 hover:bg-gold-600 text-sm font-medium py-2 rounded-lg transition">
                    <ICheck size={15}/> Marcar cuota pagada
                  </button>
                  {paid>0 && <button onClick={()=>onUndo(d.id)} className="px-3 py-2 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-paper-200 dark:hover:bg-ink-600 transition">Deshacer</button>}
                </div>
              )}
            </div>
          );
        })}
      </div>
      </Collapsible>
    </div>
  );
}

/* =========================================================================
   SUSCRIPCIONES
   ========================================================================= */
function SubsView({ subs, accounts, onAdd, onEdit, onDelete, onToggle, onMarkPaid, onUndo, totalMonthly, totalAnnual }) {
  const [q, setQ] = useState('');
  const [filter, setFilter] = useState('todas');
  const filtered = subs.filter(s => {
    if (filter==='activas' && !s.active) return false;
    if (filter==='canceladas' && s.active) return false;
    return s.name.toLowerCase().includes(q.toLowerCase());
  });
  const monthlySubs = filtered.filter(s => s.frequency!=='annual')
    .map(s => ({ ...s, _daysUntil: s.active ? nextOccurrence(s.billingDay).daysUntil : Infinity }))
    .sort((a,b) => a._daysUntil - b._daysUntil);
  const annualSubs = filtered.filter(s => s.frequency==='annual')
    .map(s => ({ ...s, _daysUntil: s.active && s.billingDate ? nextAnnualOccurrence(s.billingDate).daysUntil : Infinity }))
    .sort((a,b) => a._daysUntil - b._daysUntil);

  const renderCard = (s) => {
    const daysUntil = s.active ? (s.frequency==='annual' ? (s.billingDate ? nextAnnualOccurrence(s.billingDate).daysUntil : null) : nextOccurrence(s.billingDay).daysUntil) : null;
    const paid = s.active && isPaidThisCycle(s);
    const nowS = new Date();
    const overdue = s.active && s.mode!=='auto' && !paid && s.frequency!=='annual'
      && startedByMonth(s.startDate, nowS.getFullYear(), nowS.getMonth())
      && nowS.getDate() > clampDay(s.billingDay, nowS.getFullYear(), nowS.getMonth());
    const paidToday = s.mode==='auto' ? (daysUntil===0 && paid) : (s.lastPaid===todayISO());
    return (
      <div key={s.id} className={`bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500/70 rounded-2xl p-5 shadow-soft flex flex-col gap-3 animate-fadein ${!s.active && 'opacity-60'}`}>
        <div className="flex items-start justify-between gap-2">
          <div className="flex items-center gap-3 min-w-0">
            <span className="text-2xl shrink-0">{s.emoji}</span>
            <div className="min-w-0">
              <div className="font-medium text-ink-900 dark:text-gray-100 flex items-center gap-2 flex-wrap">
                <span className="truncate">{s.name}</span>
                <span className="flex items-center gap-1 text-[10px] uppercase text-gray-500 border border-paper-300 dark:border-ink-500 rounded-full px-1.5 py-0.5 shrink-0">

                <AccountBadge accountId={s.accountId} accounts={accounts}/>

              <div className="text-gray-500 dark:text-gray-500">

          paid ? (
            <div className="flex items-center justify-between gap-2">
              <span className="flex items-center gap-1.5 text-emerald-400 text-xs"><ICheck size={13}/> Pagado este ciclo</span>
              {paidToday && <button onClick={()=>onUndo(s.id)} className="px-3 py-1.5 rounded-lg text-xs text-gray-500 dark:text-gray-400 hover:bg-paper-200 dark:hover:bg-ink-600 transition">Deshacer</button>}
            </div>

              <ICheck size={13}/> Marcar como pagado
            </button>
          )
        )}
        <button onClick={()=>onToggle(s.id)} className={`flex items-center justify-between px-3 py-2 rounded-lg text-sm transition ${s.active ? 'bg-emerald-500/15 text-emerald-400':'bg-paper-200 dark:bg-ink-600 text-gray-500 dark:text-gray-400'}`}>

        {daysUntil!==null && <DueCountdown daysUntil={daysUntil} paid={paid} paidToday={paidToday}/>}

  return (
    <div className="flex flex-col gap-5">
      <div className="grid sm:grid-cols-2 gap-4">
        <KpiCard label="Gasto mensual" value={fmt(totalMonthly)} sub="Solo suscripciones mensuales" accent={COLORS.sub} icon={<IRepeat size={16}/>}/>
        <KpiCard label="Gasto anual" value={fmt(totalAnnual)} sub="Solo suscripciones anuales" accent={COLORS.sub} icon={<ICalendar size={16}/>}/>

      <div className="flex flex-wrap items-center gap-3">
        <div className="relative flex-1 min-w-[200px]">
          <ISearch size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 dark:text-gray-500"/>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar suscripción…" className={inputCls+" pl-9"}/>
        </div>
        <div className="flex gap-2">
          <Pill active={filter==='activas'} onClick={()=>setFilter('activas')} color={COLORS.sub}>Activas</Pill>
          <Pill active={filter==='canceladas'} onClick={()=>setFilter('canceladas')} color={COLORS.sub}>Canceladas</Pill>
          <Pill active={filter==='todas'} onClick={()=>setFilter('todas')} color={COLORS.sub}>Todas</Pill>

      </div>
      {filtered.length===0 && <EmptyState text="No hay suscripciones que coincidan." onAdd={onAdd} cta="Añadir suscripción"/>}

      {monthlySubs.length>0 && (
        <Collapsible title="Mensuales" count={monthlySubs.length}>
          <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
            {monthlySubs.map(renderCard)}

      )}
      {annualSubs.length>0 && (
        <Collapsible title="Anuales" count={annualSubs.length}>
          <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
            {annualSubs.map(renderCard)}
          </div>
        </Collapsible>
      )}
    </div>
  );
}

function FixedView({ items, accounts, onAdd, onEdit, onDelete, onMarkPaid, onUndo, onToggleMonth, totalMonthly, withDayCount, noDayCount, noDayTotal }) {
  const [q, setQ] = useState('');
  const filtered = items.filter(f=>f.name.toLowerCase().includes(q.toLowerCase()))
    .map(f => ({ ...f, _daysUntil: f.paymentDay ? nextOccurrence(f.paymentDay).daysUntil : Infinity }))
    .sort((a,b) => a._daysUntil - b._daysUntil);
  return (
    <div className="flex flex-col gap-5">
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
        <MiniKpi label="Gastos fijos / mes" value={fmt(totalMonthly)} sub="Lo que aplica este mes" accent={COLORS.fixed} icon={<IReceipt size={13}/>}/>
        <MiniKpi label="No esenciales" value={fmt(items.filter(f=>f.essential===false).reduce((a,f)=>a+(f.monthlyValue||0),0))} sub="Lo que podrías recortar" accent={COLORS.debt} icon={<IDrop size={13}/>}/>
        <MiniKpi label="Con día fijo" value={withDayCount} sub="Gasto(s) registrado(s)" accent={COLORS.gold} icon={<ICalendar size={13}/>}/>
        <MiniKpi label="Sin día fijo" value={noDayCount} sub={noDayCount>0 ? `Pendiente(s): ${fmt(noDayTotal)}` : 'Todo al día'} accent={COLORS.sub} icon={<ICalendar size={13}/>}/>
      </div>
      <div className="relative">
        <ISearch size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 dark:text-gray-500"/>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar gasto fijo…" className={inputCls+" pl-9 max-w-md"}/>
      </div>
      {filtered.length===0 && <EmptyState text="No hay gastos fijos registrados todavía." onAdd={onAdd} cta="Añadir gasto fijo"/>}
      {(() => {
        const renderCard = (f) => {
          const daysUntil = f.paymentDay ? nextOccurrence(f.paymentDay).daysUntil : null;
          const nextDate = f.paymentDay ? nextOccurrence(f.paymentDay).date : null;
          const now = new Date();
          const paid = f.paymentDay ? isFixedPaidForMonth(f, now.getFullYear(), now.getMonth()) : isPaidThisCycle(f);
          // atrasado: el día de este mes ya pasó y nunca se marcó como pagado
          const overdue = !!f.paymentDay && f.mode!=='auto' && !paid
            && startedByMonth(f.startDate, now.getFullYear(), now.getMonth())
            && now.getDate() > clampDay(f.paymentDay, now.getFullYear(), now.getMonth());
          const paidToday = f.mode==='auto' ? (daysUntil===0 && paid) : (f.lastPaid===todayISO());
          return (
          <div key={f.id} className="bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500/70 rounded-2xl p-5 shadow-soft flex flex-col gap-3 animate-fadein">
            <div className="flex items-start justify-between gap-2">
              <div className="flex items-center gap-3 min-w-0">
                <span className="text-2xl shrink-0">{f.emoji}</span>
                <div className="min-w-0">
                  <div className="font-medium text-ink-900 dark:text-gray-100 flex items-center gap-2 flex-wrap">
                    <span className="truncate">{f.name}</span>
                    <span className="flex items-center gap-1 text-[10px] uppercase text-gray-500 border border-paper-300 dark:border-ink-500 rounded-full px-1.5 py-0.5 shrink-0">
                      {f.mode==='auto' ? <><IBolt size={10}/> Auto</> : <><IHand size={10}/> Manual</>}
                    </span>
                    <AccountBadge accountId={f.accountId} accounts={accounts}/>
                  </div>
                  <div className="text-gray-500 dark:text-gray-500">{f.category}{nextDate ? ` · ${nextDate.toLocaleDateString('es-ES',{day:'numeric',month:'short'})}` : ' · Sin día fijo'}</div>
                </div>
              </div>
              <div className="flex gap-1 shrink-0">
                <button onClick={()=>onEdit(f)} className="p-1.5 text-gray-500 hover:text-ink-900 dark:hover:text-gray-200 transition"><IEdit size={16}/></button>
                <button onClick={()=>onDelete(f)} className="p-1.5 text-gray-500 dark:text-gray-500 hover:text-red-400 transition"><ITrash size={16}/></button>
              </div>
            </div>
            <div className="font-mono text-ink-900 dark:text-gray-100 text-lg">{fmt(f.monthlyValue)}</div>
            <MonthTickBar months={yearProgressMonths(f)} onToggle={f.mode!=='auto' ? (idx)=>onToggleMonth(f.id, idx) : undefined}/>
            <div className="text-[11px] text-gray-500 -mt-1">{yearProgressMonths(f).filter(Boolean).length} de 12 meses de {new Date().getFullYear()}</div>
            {f.mode!=='auto' && (
              paid ? (
                <div className="flex items-center justify-between gap-2">
                  <span className="flex items-center gap-1.5 text-emerald-400 text-xs"><ICheck size={13}/> Pagado este ciclo</span>
                  {paidToday && <button onClick={()=>onUndo(f.id)} className="px-3 py-1.5 rounded-lg text-xs text-gray-500 dark:text-gray-400 hover:bg-paper-200 dark:hover:bg-ink-600 transition">Deshacer</button>}
                </div>
              ) : (
                <button onClick={()=>onMarkPaid(f.id)} className="self-start flex items-center gap-1.5 bg-gold-500 hover:bg-gold-600 text-ink-900 text-xs font-medium px-3 py-1.5 rounded-lg transition">
                  <ICheck size={13}/> Marcar como pagado
                </button>
              )
            )}
            {overdue && (
              <div className="flex items-center gap-1.5 text-orange-500 text-xs bg-orange-500/10 rounded-lg px-2 py-1.5">
                <IBell size={13}/> Atrasado: no marcaste el pago de {MESES[now.getMonth()].toLowerCase()}
              </div>
            )}
            {daysUntil!==null && <DueCountdown daysUntil={daysUntil} paid={paid} paidToday={paidToday}/>}
          </div>
          );
        };

        // esencial por defecto: si nunca se marcó, se considera esencial
        const esenciales = filtered.filter(f => f.essential !== false);
        const noEsenciales = filtered.filter(f => f.essential === false);

        return (
          <>
            {esenciales.length>0 && (
              <Collapsible title="Gastos fijos" count={esenciales.length}>
                <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
                  {esenciales.map(renderCard)}
                </div>
              </Collapsible>
            )}
            {noEsenciales.length>0 && (
              <Collapsible title="No esenciales" count={noEsenciales.length}>
                <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
                  {noEsenciales.map(renderCard)}
                </div>
              </Collapsible>
            )}
          </>
        );
      })()}
    </div>
  );
}

function SavingsView({ projects, entries, accounts, totalSaved, onAddProject, onEditProject, onDeleteProject, onAddEntry, onEditEntry, onDeleteEntry }) {
  // el dinero que se envió a una cuenta VIVE en esa cuenta, no en la etiqueta del proyecto.
  // por eso un proyecto sin cuenta vinculada solo suma los aportes que no fueron a ninguna cuenta.
  const amountFor = (projectId) => entries.filter(e=>e.projectId===projectId && !e.toAccountId).reduce((a,e)=>a+e.amount,0);
  const sinDestino = entries.filter(e=>!e.projectId && !e.toAccountId).reduce((a,e)=>a+e.amount,0);
  const sortedEntries = [...entries].sort((a,b)=> new Date(b.date) - new Date(a.date));
  return (
    <div className="flex flex-col gap-5">
      <KpiCard label="Total ahorrado" value={fmt(totalSaved)} sub={`${entries.length} aporte(s) registrados`} accent="#3DDC97" icon={<IPiggy size={16}/>}/>
      <p className="text-xs text-gray-500 -mt-3 px-1">
        El dinero vive en las cuentas, no en las etiquetas. Un proyecto vinculado a una cuenta muestra el saldo de esa cuenta; si lo desvinculas, el proyecto queda en 0 porque el dinero sigue en la cuenta.
      </p>

      <div className="flex items-center justify-between">
        <h3 className="font-medium text-ink-900 dark:text-gray-100">Proyectos</h3>
        <button onClick={onAddProject} className="flex items-center gap-1.5 text-gold-500 hover:text-gold-600 text-sm transition"><IPlus size={15}/> Nuevo proyecto</button>
      </div>

      {projects.length===0 && sinDestino===0 ? (
        <EmptyState text="Crea un proyecto (ej. 'Vacaciones', 'Fondo de emergencia') para empezar a destinar tus ahorros." onAdd={onAddProject} cta="Nuevo proyecto"/>
      ) : (
        <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
          {projects.map(p => {
            const linkedAccount = (accounts||[]).find(a=>a.id===p.accountId);
            // si el proyecto está vinculado a una cuenta, lo ahorrado ES el saldo de esa cuenta
            const saved = linkedAccount ? (linkedAccount.balance||0) : amountFor(p.id);
            const pct = p.targetAmount ? Math.min(100, Math.round((saved/p.targetAmount)*100)) : null;
            return (
              <div key={p.id} className="bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500/70 rounded-2xl p-5 shadow-soft flex flex-col gap-3 animate-fadein">
                <div className="flex items-start justify-between">
                  <div className="flex items-center gap-3 min-w-0">
                    <span className="text-2xl shrink-0">{p.emoji}</span>
                    <div className="min-w-0">
                      <div className="font-medium text-ink-900 dark:text-gray-100 truncate">{p.name}</div>
                      {linkedAccount && (
                        <div className="text-xs text-gold-500 truncate">🔗 {linkedAccount.emoji} {linkedAccount.name}</div>
                      )}
                    </div>
                  </div>
                  <div className="flex gap-1">
                    <button onClick={()=>onEditProject(p)} className="p-1.5 text-gray-500 hover:text-ink-900 dark:hover:text-gray-200 transition"><IEdit size={16}/></button>
                    <button onClick={()=>onDeleteProject(p)} className="p-1.5 text-gray-500 dark:text-gray-500 hover:text-red-400 transition"><ITrash size={16}/></button>
                  </div>
                </div>
                <div className="font-mono text-xl text-ink-900 dark:text-gray-100">{fmt(saved)}</div>
                {p.targetAmount ? (
                  <>
                    <div className="h-2 rounded-full bg-paper-200 dark:bg-ink-600 overflow-hidden">
                      <div className="h-full rounded-full transition-all bg-emerald-500" style={{width:`${pct}%`}}/>
                    </div>
                    <div className="text-xs text-gray-500">{pct}% de {fmt(p.targetAmount)}</div>
                  </>
                ) : <div className="text-xs text-gray-500">Sin meta fija</div>}
              </div>
            );
          })}
          {sinDestino > 0 && (
            <div className="bg-paper-200/60 dark:bg-ink-600/40 border border-dashed border-paper-300 dark:border-ink-500 rounded-2xl p-5 flex flex-col gap-2 justify-center">
              <div className="text-gray-500 text-sm">Sin destino específico</div>
              <div className="font-mono text-xl text-ink-900 dark:text-gray-100">{fmt(sinDestino)}</div>
            </div>
          )}
        </div>
      )}

      <div className="flex items-center justify-between mt-2">
        <h3 className="font-medium text-ink-900 dark:text-gray-100">Aportes</h3>
        <button onClick={onAddEntry} className="flex items-center gap-1.5 text-gold-500 hover:text-gold-600 text-sm transition"><IPlus size={15}/> Nuevo ahorro</button>
      </div>
      {sortedEntries.length===0 ? (
        <EmptyState text="Todavía no has registrado ningún ahorro." onAdd={onAddEntry} cta="Nuevo ahorro"/>
      ) : (
        <div className="flex flex-col gap-2">
          {sortedEntries.map(e => {
            const project = projects.find(p=>p.id===e.projectId);
            const from = (accounts||[]).find(a=>a.id===e.fromAccountId);
            const to = (accounts||[]).find(a=>a.id===e.toAccountId);
            return (
              <div key={e.id} className="bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500/70 rounded-2xl p-4 shadow-soft flex items-center gap-4 animate-fadein">
                <span className="text-2xl">{project ? project.emoji : '💶'}</span>
                <div className="flex-1 min-w-0">
                  <div className="font-medium text-ink-900 dark:text-gray-100 truncate">{project ? project.name : 'Sin destino específico'}</div>
                  <div className="text-gray-500 dark:text-gray-500">
                    {e.date}{e.note ? ` · ${e.note}` : ''}
                    {(from || to) && (
                      <span className="ml-1">· {from ? `${from.emoji} ${from.name}` : '—'} → {to ? `${to.emoji} ${to.name}` : '—'}</span>
                    )}
                  </div>
                </div>
                <div className="font-mono text-emerald-400 w-24 text-right">+{fmt(e.amount)}</div>
                <div className="flex gap-1">
                  <button onClick={()=>onEditEntry(e)} className="p-1.5 text-gray-500 hover:text-ink-900 dark:hover:text-gray-200 transition"><IEdit size={16}/></button>
                  <button onClick={()=>onDeleteEntry(e)} className="p-1.5 text-gray-500 dark:text-gray-500 hover:text-red-400 transition"><ITrash size={16}/></button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function GoalsView({ goals, netWorth, netFlowThisMonth, onAdd, onEdit, onDelete }) {
  return (
    <div className="flex flex-col gap-5">
      <div className="bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500/70 rounded-2xl p-4 shadow-soft flex items-center justify-between flex-wrap gap-2">
        <span className="text-gray-500 dark:text-gray-400">Tu valor neto actual</span>
        <span className="font-mono text-lg font-semibold text-ink-900 dark:text-gray-100">{fmt(netWorth)}</span>
      </div>
      {goals.length===0 ? (
        <EmptyState text="Crea una meta de valor neto (ej. 'Colchón de 6 meses' o 'Independencia financiera') y te digo si vas a tiempo, según tu flujo real de este mes." onAdd={onAdd} cta="Añadir meta"/>
      ) : (
        <div className="grid sm:grid-cols-2 gap-4">
          {goals.map(g => <GoalCard key={g.id} g={g} netWorth={netWorth} netFlowThisMonth={netFlowThisMonth} onEdit={onEdit} onDelete={onDelete}/>)}
        </div>
      )}
    </div>
  );
}

function GoalCard({ g, netWorth, netFlowThisMonth, onEdit, onDelete }) {
  const totalNeeded = g.targetAmount - g.startAmount;
  const progressed = netWorth - g.startAmount;
  const pct = totalNeeded !== 0 ? Math.min(100, Math.max(0, Math.round((progressed/totalNeeded)*100))) : (netWorth>=g.targetAmount ? 100 : 0);
  const achieved = netWorth >= g.targetAmount;
  const remaining = g.targetAmount - netWorth;
  // proyección simple: si tu flujo real de este mes se mantiene igual cada mes, ¿cuánto tardarías?
  const monthsNeeded = (!achieved && netFlowThisMonth > 0) ? remaining / netFlowThisMonth : null;

  let status, statusColor;
  if (achieved) {
    status = '🎉 Meta cumplida'; statusColor = '#3DDC97';
  } else if (!g.targetDate) {
    if (monthsNeeded !== null) { status = `A tu ritmo actual, la alcanzarías en ~${Math.ceil(monthsNeeded)} mes(es).`; statusColor = COLORS.gold; }
    else { status = 'Tu flujo real de este mes es 0 o negativo — no se puede proyectar una fecha.'; statusColor = '#8A8F98'; }
  } else {
    const monthsLeft = (new Date(g.targetDate) - new Date()) / (1000*60*60*24*30.44);
    if (monthsNeeded === null) { status = 'A este ritmo no llegarías — tu flujo de este mes es 0 o negativo.'; statusColor = '#EF4444'; }
    else if (monthsNeeded <= monthsLeft) { status = 'Vas a tiempo para llegar antes de tu fecha límite.'; statusColor = '#3DDC97'; }
    else { status = `Vas atrasado: a este ritmo llegarías ~${Math.ceil(monthsNeeded - monthsLeft)} mes(es) tarde.`; statusColor = '#F97316'; }
  }

  return (
    <div className="bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500/70 rounded-2xl p-5 shadow-soft flex flex-col gap-3">
      <div className="flex items-start justify-between gap-2">
        <div className="min-w-0">
          <div className="font-medium text-ink-900 dark:text-gray-100 truncate">{g.name}</div>
          <div className="text-xs text-gray-500">Meta: {fmt(g.targetAmount)}{g.targetDate ? ` · ${fmtDate(g.targetDate)}` : ' · sin fecha límite'}</div>
        </div>
        <div className="flex gap-1 shrink-0">
          <button onClick={()=>onEdit(g)} className="p-1.5 text-gray-500 hover:text-ink-900 dark:hover:text-gray-200 transition"><IEdit size={16}/></button>
          <button onClick={()=>onDelete(g)} className="p-1.5 text-gray-500 dark:text-gray-500 hover:text-red-400 transition"><ITrash size={16}/></button>
        </div>
      </div>
      <div className="flex items-baseline justify-between">
        <span className="font-mono text-lg text-ink-900 dark:text-gray-100">{fmt(netWorth)}</span>
        <span className="font-mono text-sm text-gray-500">{pct}%</span>
      </div>
      <div className="h-2.5 rounded-full bg-paper-200 dark:bg-ink-600 overflow-hidden">
        <div className="h-full rounded-full transition-all" style={{width:`${pct}%`, background: achieved ? '#3DDC97' : COLORS.gold}}/>
      </div>
      <p className="text-xs" style={{color: statusColor}}>{status}</p>
    </div>
  );
}

function DebtPayoffCard({ debts }) {
  const [debtId, setDebtId] = useState('');
  const [extra, setExtra] = useState('');
  const debt = debts.find(d=>d.id===debtId);
  const extraNum = Number(extra) || 0;

  const result = useMemo(() => {
    if (!debt) return null;
    const paid = effectivePaid(debt);
    const remainingInstallments = Math.max(0, debt.totalInstallments - paid);
    const pending = Math.round(remainingInstallments * debt.monthlyPayment * 100)/100;
    const newMonthly = debt.monthlyPayment + extraNum;
    const newMonths = newMonthly>0 ? Math.ceil(pending / newMonthly) : null;
    const monthsSaved = newMonths!==null ? remainingInstallments - newMonths : null;
    return {
      remainingInstallments, pending, newMonthly, newMonths, monthsSaved,
      currentPayoffDate: addMonths(new Date(), remainingInstallments),
      newPayoffDate: newMonths!==null ? addMonths(new Date(), newMonths) : null,
    };
  }, [debt, extraNum]);

  return (
    <SimCard title="Pagar extra a una deuda" icon={<ICard size={18} className="text-red-400"/>}>
      <div className="grid sm:grid-cols-2 gap-4">
        <Field label="Deuda">
          <select className={inputCls} value={debtId} onChange={e=>setDebtId(e.target.value)}>
            <option value="">Elige una deuda</option>
            {debts.map(d => <option key={d.id} value={d.id}>{d.emoji} {d.name}</option>)}
          </select>
        </Field>
        <Field label="Pago extra al mes (€)">
          <input type="number" step="0.01" className={inputCls} value={extra} onChange={e=>setExtra(e.target.value)} placeholder="Ej. 50"/>
        </Field>
      </div>
      {debt && result ? (
        <div className="grid sm:grid-cols-3 gap-4 pt-3 border-t border-paper-300/60 dark:border-ink-500/40">
          <div>
            <div className="text-xs text-gray-500">Cuota mensual</div>
            <div className="font-mono text-ink-900 dark:text-gray-100">{fmt(debt.monthlyPayment)} → {fmt(result.newMonthly)}</div>
          </div>
          <div>
            <div className="text-xs text-gray-500">Terminarías en</div>
            <div className="font-mono text-ink-900 dark:text-gray-100">{fmtDate(result.currentPayoffDate)}{result.newPayoffDate && <> → <span className="text-emerald-400">{fmtDate(result.newPayoffDate)}</span></>}</div>
          </div>
          <div>
            <div className="text-xs text-gray-500">Te ahorras</div>
            <div className="font-mono text-emerald-400">{result.monthsSaved>0 ? `${result.monthsSaved} mes(es)` : '—'}</div>
          </div>
        </div>
      ) : <p className="text-xs text-gray-500">Elige una deuda para ver el resultado.</p>}
    </SimCard>
  );
}

function IncomeChangeCard({ incomeThisMonth, totalCommitted, antThisMonth }) {
  const [pct, setPct] = useState('');
  const pctNum = Number(pct) || 0;
  const newIncome = Math.round(incomeThisMonth * (1 + pctNum/100) * 100)/100;
  const currentFlow = incomeThisMonth - totalCommitted - antThisMonth;
  const newFlow = newIncome - totalCommitted - antThisMonth;
  const diff = Math.round((newFlow - currentFlow)*100)/100;

  return (
    <SimCard title="Cambio en tus ingresos" icon={<IWallet size={18} className="text-gold-500"/>}>
      <Field label="Cambio en tu ingreso mensual (%)">
        <input type="number" step="1" className={inputCls+" max-w-[160px]"} value={pct} onChange={e=>setPct(e.target.value)} placeholder="Ej. 10 o -10"/>
      </Field>
      {pct!=='' && (
        <div className="grid sm:grid-cols-3 gap-4 pt-3 border-t border-paper-300/60 dark:border-ink-500/40">
          <div>
            <div className="text-xs text-gray-500">Ingreso mensual</div>
            <div className="font-mono text-ink-900 dark:text-gray-100">{fmt(incomeThisMonth)} → {fmt(newIncome)}</div>
          </div>
          <div>
            <div className="text-xs text-gray-500">Flujo real al mes</div>
            <div className="font-mono"><span className="text-gray-500">{fmt(currentFlow)}</span> → <span style={{color: newFlow>=currentFlow ? '#3DDC97':'#EF4444'}}>{fmt(newFlow)}</span></div>
          </div>
          <div>
            <div className="text-xs text-gray-500">Diferencia al mes</div>
            <div className="font-mono" style={{color: diff>=0?'#3DDC97':'#EF4444'}}>{diff>=0?'+':''}{fmt(diff)}</div>
          </div>
        </div>
      )}
    </SimCard>
  );
}

function NewExpenseCard({ totalCommitted, incomeThisMonth, antThisMonth, liquidezTotal }) {
  const [amount, setAmount] = useState('');
  const amountNum = Number(amount) || 0;
  const newCommitted = Math.round((totalCommitted + amountNum)*100)/100;
  const currentFlow = incomeThisMonth - totalCommitted - antThisMonth;
  const newFlow = incomeThisMonth - newCommitted - antThisMonth;
  const currentMonths = totalCommitted>0 ? liquidezTotal/totalCommitted : null;
  const newMonths = newCommitted>0 ? liquidezTotal/newCommitted : null;

  return (
    <SimCard title="Añadir un gasto fijo o suscripción nueva" icon={<IReceipt size={18} className="text-blue-400"/>}>
      <Field label="Monto mensual del nuevo gasto (€)">
        <input type="number" step="0.01" className={inputCls+" max-w-[160px]"} value={amount} onChange={e=>setAmount(e.target.value)} placeholder="Ej. 15"/>
      </Field>
      {amount!=='' && (
        <div className="grid sm:grid-cols-3 gap-4 pt-3 border-t border-paper-300/60 dark:border-ink-500/40">
          <div>
            <div className="text-xs text-gray-500">Comprometido al mes</div>
            <div className="font-mono text-ink-900 dark:text-gray-100">{fmt(totalCommitted)} → {fmt(newCommitted)}</div>
          </div>
          <div>
            <div className="text-xs text-gray-500">Flujo real al mes</div>
            <div className="font-mono"><span className="text-gray-500">{fmt(currentFlow)}</span> → <span style={{color: newFlow>=0?'#3DDC97':'#EF4444'}}>{fmt(newFlow)}</span></div>
          </div>
          <div>
            <div className="text-xs text-gray-500">Meses de colchón</div>
            <div className="font-mono text-ink-900 dark:text-gray-100">{currentMonths!==null?Math.round(currentMonths*10)/10:'—'} → {newMonths!==null?Math.round(newMonths*10)/10:'—'}</div>
          </div>
        </div>
      )}
    </SimCard>
  );
}

function SimulatorView({ debts, incomeThisMonth, totalCommitted, antThisMonth, netFlowThisMonth, liquidezTotal }) {
  return (
    <div className="flex flex-col gap-5">
      <p className="text-sm text-gray-500 -mt-1">Prueba escenarios sin riesgo — nada de esto se guarda ni toca tus datos reales, es solo para ver el efecto antes de decidir.</p>
      {debts.length>0
        ? <DebtPayoffCard debts={debts}/>
        : <SimCard title="Pagar extra a una deuda" icon={<ICard size={18} className="text-red-400"/>}><p className="text-xs text-gray-500">No tienes deudas con número fijo de cuotas para simular.</p></SimCard>}
      <IncomeChangeCard incomeThisMonth={incomeThisMonth} totalCommitted={totalCommitted} antThisMonth={antThisMonth}/>
      <NewExpenseCard totalCommitted={totalCommitted} incomeThisMonth={incomeThisMonth} antThisMonth={antThisMonth} liquidezTotal={liquidezTotal}/>

}

// sección plegable compacta para el detalle de cuenta
function MiniCollapsible({ title, count, children }) {
  const [open, setOpen] = useState(true);
  return (
    <div>
      <button onClick={()=>setOpen(o=>!o)} className="flex items-center gap-1.5 mb-1 group w-fit">
        <span className={`text-gray-500 transition-transform ${open ? 'rotate-90' : ''}`}><IChevR size={13}/></span>
        <h4 className="text-xs uppercase tracking-wider text-gray-500 font-medium group-hover:text-gold-500 transition">{title}</h4>
        <span className="text-[10px] font-mono text-gray-500 bg-paper-200 dark:bg-ink-600 rounded-full px-1.5">{count}</span>
      </button>
      {open && children}
    </div>
  );
}

function AccountDetail({ account, accounts, savingsEntries, incomeEntries, antExpenses, transferList, duePayments, appliedPayments, debts, subs, fixed, projects, exchangeRate,
                         onEditSaving, onDeleteSaving, onEditIncome, onDeleteIncome, onEditAnt, onDeleteAnt, onEditTransfer, onDeleteTransfer, onEditDebt, onDeleteDebt,
                         onEditSub, onDeleteSub, onEditFixed, onDeleteFixed, onCancelCharge, onClose }) {
  const id = account.id;
  const nameOf = (aid) => { const a = accounts.find(x=>x.id===aid); return a ? `${a.emoji} ${a.name}` : '—'; };

  // transferencias de ahorro que tocan esta cuenta
  const transfers = savingsEntries
    .filter(e => e.fromAccountId===id || e.toAccountId===id)
    .sort((a,b)=> new Date(b.date) - new Date(a.date));

  // pagos que realmente se descontaron de esta cuenta, con su fecha real
  const charged = (duePayments||[])
    .filter(p => p.accountId === id)
    .sort((a,b) => b.date - a.date);
  const typeLabel = { debt:'Deuda', sub:'Suscripción', fixed:'Gasto fijo' };
  // importe que de verdad se movió por cada cargo (puede ser 0 si el corte de "ayer" lo dejó en 0€)
  const appliedByKey = useMemo(() => {
    const map = {};
    (appliedPayments||[]).forEach(p => {
      const pp = typeof p === 'string' ? { key:p, amount:0 } : p;
      map[pp.key] = pp.amount || 0;
    });
    return map;
  }, [appliedPayments]);

  const ants = (antExpenses||[])
    .filter(e => e.accountId===id)
    .sort((a,b)=> new Date(b.date) - new Date(a.date));

  const accTransfers = (transferList||[])
    .filter(t => t.fromAccountId===id || t.toAccountId===id)
    .sort((a,b)=> new Date(b.date) - new Date(a.date));

  const incomes = (incomeEntries||[])
    .filter(e => e.accountId===id)
    .sort((a,b)=> new Date(b.date) - new Date(a.date));

  const linkedDebts = debts.filter(d=>d.accountId===id && !d.finished);
  const linkedSubs  = subs.filter(s=>s.accountId===id);
  const linkedFixed = fixed.filter(f=>f.accountId===id);

  const monthlyOut =
    linkedDebts.reduce((s,d)=>s+(d.monthlyPayment||0),0) +
    linkedSubs.filter(s=>s.active && s.frequency!=='annual').reduce((s,x)=>s+(x.monthlyPrice||0),0) +
    linkedFixed.reduce((s,f)=>s+(f.monthlyValue||0),0);

  const Row = ({ emoji, title, subtitle, amount, positive, onEdit, onDelete }) => (
    <div className="flex items-center gap-3 py-2.5 border-t border-paper-300/60 dark:border-ink-500/40">
      <span className="text-xl shrink-0">{emoji}</span>
      <div className="flex-1 min-w-0">
        <div className="text-sm text-ink-900 dark:text-gray-100 truncate">{title}</div>
        <div className="text-xs text-gray-500 truncate">{subtitle}</div>
      </div>
      <span className={`font-mono text-sm shrink-0 ${positive ? 'text-emerald-400' : 'text-red-400'}`}>
        {positive ? '+' : '−'}{fmt(Math.abs(amount))}
      </span>
      {(onEdit || onDelete) ? (
        <div className="flex gap-1 shrink-0">
          <button onClick={onEdit} className="p-1.5 text-gray-500 hover:text-ink-900 dark:hover:text-gray-200 transition"><IEdit size={15}/></button>
          <button onClick={onDelete} className="p-1.5 text-gray-500 hover:text-red-400 transition"><ITrash size={15}/></button>
        </div>
      ) : <div className="w-[62px] shrink-0"/>}
    </div>
  );

  const hasNothing = charged.length===0 && incomes.length===0 && ants.length===0 && accTransfers.length===0 && transfers.length===0 && linkedDebts.length===0 && linkedSubs.length===0 && linkedFixed.length===0;

  // secciones plegables
  const Section = ({ title, count, children }) => {
    const [open, setOpen] = useState(true);
    return (
      <div>
        <button onClick={()=>setOpen(o=>!o)}
          className="w-full flex items-center gap-1.5 text-xs uppercase tracking-wider text-gray-500 font-medium mb-1 hover:text-ink-900 dark:hover:text-gray-300 transition">
          <span className={`transition-transform ${open ? 'rotate-90' : ''}`}>▸</span>
          {title}
          <span className="text-gray-400 normal-case">({count})</span>
        </button>
        {open && children}
      </div>
    );
  };

  return (
    <div className="flex flex-col gap-4">
      <div className="flex items-center gap-2 md:hidden">
        <span className="text-2xl">{account.emoji}</span>
        <h2 className="font-semibold text-lg text-ink-900 dark:text-gray-100 truncate">{account.name}</h2>
      </div>
      <div className="flex items-center justify-between bg-paper-200 dark:bg-ink-600 rounded-xl px-4 py-3">
        <div>
          <div className="text-xs uppercase tracking-wider text-gray-500">Saldo actual</div>
          <div className={`font-mono text-xl font-semibold ${account.balance<0 ? 'text-red-400':'text-ink-900 dark:text-gray-100'}`}>{fmtCur(account.balance, account.currency)}</div>
          {account.currency==='USD' && <div className="text-xs text-gray-500 mt-0.5">≈ {fmt(accountBalanceInEur(account, exchangeRate))}</div>}
        </div>
        {monthlyOut > 0 && (
          <div className="text-right">
            <div className="text-xs uppercase tracking-wider text-gray-500">Sale cada mes</div>
            <div className="font-mono text-lg text-red-400">−{fmt(monthlyOut)}</div>
          </div>
        )}
      </div>

      {hasNothing && <p className="text-sm text-gray-500 py-4 text-center">Esta cuenta todavía no tiene movimientos ni pagos vinculados.</p>}

      {charged.length>0 && (
        <MiniCollapsible title="Pagos realizados" count={charged.length}>
          {charged.map(p => {
            const real = appliedByKey[p.key] || 0;
            return (
              <div key={p.key} className="flex items-center gap-3 py-2.5 border-t border-paper-300/60 dark:border-ink-500/40">
                <span className="text-xl shrink-0">{p.emoji}</span>
                <div className="flex-1 min-w-0">
                  <div className="text-sm text-ink-900 dark:text-gray-100 truncate">{p.name}</div>
                  <div className="text-xs text-gray-500 truncate">{fmtDate(p.date)} · {typeLabel[p.type]}</div>
                </div>
                <span className="font-mono text-sm shrink-0 text-red-400">−{fmt(Math.abs(real))}</span>
                {real>0 ? (
                  <button onClick={()=>onCancelCharge({ key:p.key, accountId:id, amount:real, name:`${p.name} · ${fmtDate(p.date)}` })}
                    className="text-xs text-gray-500 hover:text-red-400 underline decoration-dotted transition shrink-0">Cancelar</button>
                ) : <div className="w-[62px] shrink-0"/>}
              </div>
            );
          })}
        </MiniCollapsible>
      )}

      {incomes.length>0 && (
        <MiniCollapsible title="Entradas" count={incomes.length}>
          {incomes.map(e => (
            <Row key={e.id} emoji="💶" title={e.note || e.category || 'Entrada'}
              subtitle={`${e.date}${e.category ? ` · ${e.category}` : ''}`}
              amount={e.amount} positive={true}
              onEdit={()=>onEditIncome(e)} onDelete={()=>onDeleteIncome(e)}/>
          ))}
        </MiniCollapsible>
      )}

      {ants.length>0 && (
        <MiniCollapsible title="Gastos hormiga" count={ants.length}>
          {ants.map(e => (
            <Row key={e.id} emoji="🐜" title={e.note || e.category || 'Gasto hormiga'}
              subtitle={`${fmtDate(e.date)}${e.category ? ` · ${e.category}` : ''}`}
              amount={e.amount} positive={false}
              onEdit={()=>onEditAnt(e)} onDelete={()=>onDeleteAnt(e)}/>
          ))}
        </MiniCollapsible>
      )}

      {accTransfers.length>0 && (
        <MiniCollapsible title="Transferencias entre cuentas" count={accTransfers.length}>
          {accTransfers.map(t => {
            const incoming = t.toAccountId === id;
            const other = incoming ? t.fromAccountId : t.toAccountId;
            return (
              <Row key={t.id} emoji="🔄"
                title={incoming ? `Entró desde ${nameOf(other)}` : `Salió hacia ${nameOf(other)}`}
                subtitle={`${fmtDate(t.date)}${t.note ? ` · ${t.note}` : ''}`}
                amount={t.amount} positive={incoming}
                onEdit={()=>onEditTransfer(t)} onDelete={()=>onDeleteTransfer(t)}/>
            );
          })}
        </MiniCollapsible>
      )}

      {transfers.length>0 && (
        <MiniCollapsible title="Aportes a ahorro" count={transfers.length}>
          {transfers.map(e => {
            const incoming = e.toAccountId === id;
            const other = incoming ? e.fromAccountId : e.toAccountId;
            const project = projects.find(p=>p.id===e.projectId);
            return (
              <Row key={e.id} emoji={project ? project.emoji : '💶'}
                title={incoming ? `Entró desde ${nameOf(other)}` : `Salió hacia ${nameOf(other)}`}
                subtitle={`${e.date}${project ? ` · ${project.name}` : ''}${e.note ? ` · ${e.note}` : ''}`}
                amount={e.amount} positive={incoming}
                onEdit={()=>onEditSaving(e)} onDelete={()=>onDeleteSaving(e)}/>
            );
          })}
        </MiniCollapsible>
      )}

      {linkedDebts.length>0 && (
        <MiniCollapsible title="Deudas vinculadas" count={linkedDebts.length}>
          {linkedDebts.map(d => (
            <Row key={d.id} emoji={d.emoji} title={d.name}
              subtitle={`Día ${d.paymentDay} de cada mes · ${d.mode==='auto'?'Automático':'Manual'}`}
              amount={d.monthlyPayment} positive={false}
              onEdit={()=>onEditDebt(d)} onDelete={()=>onDeleteDebt(d)}/>
          ))}
        </MiniCollapsible>
      )}

      {linkedSubs.length>0 && (
        <MiniCollapsible title="Suscripciones vinculadas" count={linkedSubs.length}>
          {linkedSubs.map(s => (
            <Row key={s.id} emoji={s.emoji} title={s.name}
              subtitle={`${s.frequency==='annual' ? 'Anual' : `Mensual, día ${s.billingDay}`}${!s.active ? ' · Cancelada' : ''}`}
              amount={s.frequency==='annual' ? s.annualPrice : s.monthlyPrice} positive={false}
              onEdit={()=>onEditSub(s)} onDelete={()=>onDeleteSub(s)}/>
          ))}
        </MiniCollapsible>
      )}

      {linkedFixed.length>0 && (
        <MiniCollapsible title="Gastos fijos vinculados" count={linkedFixed.length}>
          {linkedFixed.map(f => (
            <Row key={f.id} emoji={f.emoji} title={f.name}
              subtitle={f.paymentDay ? `Día ${f.paymentDay} de cada mes` : 'Sin día fijo'}
              amount={f.monthlyValue} positive={false}
              onEdit={()=>onEditFixed(f)} onDelete={()=>onDeleteFixed(f)}/>
          ))}
        </MiniCollapsible>
      )}

      <div className="flex justify-start mt-2">
        <button onClick={onClose} className="flex items-center gap-1.5 px-4 py-2 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-paper-200 dark:hover:bg-ink-600 transition"><IChevL size={15}/> Volver a cuentas</button>
      </div>
    </div>
  );
}

function AccountsView({ accounts, netWorth, accountsInNet, onAdd, onEdit, onDelete, onToggleActive, onToggleInNet, onOpen, debts, subs, fixed, exchangeRate, onSetExchangeRate }) {

        Cuenta en el valor neto
      </label>

      <button onClick={()=>onToggleActive(a.id)}
        className={`flex items-center justify-between px-3 py-2 rounded-lg text-sm transition ${a.active ? 'bg-emerald-500/15 text-emerald-400':'bg-paper-200 dark:bg-ink-600 text-gray-500 dark:text-gray-400'}`}>
        {a.active ? 'Cuenta activa' : 'Cuenta desactiva'}
        <span className={`w-9 h-5 rounded-full relative transition ${a.active?'bg-emerald-500':'bg-paper-300 dark:bg-ink-500'}`}>
          <span className={`absolute top-0.5 w-4 h-4 rounded-full bg-white transition-all ${a.active?'left-4':'left-0.5'}`}/>
        </span>
      </button>

  return (

      <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">

          accent={netWorth >= 0 ? '#3DDC97' : COLORS.debt} icon={<IBank size={16}/>}/>
        <KpiCard label="En positivo" value={fmt(positives)} sub="Suma de saldos a favor" accent={COLORS.gold} icon={<IWallet size={16}/>}/>
        <KpiCard label="En negativo" value={fmt(negatives)} sub="Saldos en contra (deuda)" accent={COLORS.debt} icon={<ICard size={16}/>}/>
      </div>

      <p className="text-xs text-gray-500 -mt-2 px-1">
        Solo suman las cuentas <b>activas</b> que tengan marcado "Cuenta en el valor neto". Las desactivas quedan fuera del total.
      </p>

      {hasUsd && (
        <div className="bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500/70 rounded-2xl p-4 shadow-soft flex items-center justify-between gap-3 flex-wrap">
          <div>
            <span className="uppercase tracking-wider text-gray-500 dark:text-gray-400 font-medium text-xs">Tipo de cambio</span>
            <div className="text-sm text-gray-500 mt-0.5">1 USD = {exchangeRate} EUR — se usa para convertir tus cuentas en dólares al valor neto.</div>
          </div>
          {editingRate ? (
            <div className="flex items-center gap-2">
              <input type="number" step="0.0001" autoFocus className={inputCls+" max-w-[110px]"} value={rateDraft} onChange={e=>setRateDraft(e.target.value)} onKeyDown={e=>e.key==='Enter' && saveRate()}/>
              <button onClick={saveRate} className="px-3 py-2 rounded-lg bg-gold-500 hover:bg-gold-600 text-ink-900 text-sm font-medium transition">Guardar</button>
              <button onClick={()=>setEditingRate(false)} className="px-3 py-2 rounded-lg text-gray-500 hover:bg-paper-200 dark:hover:bg-ink-600 text-sm transition">Cancelar</button>
            </div>
          ) : (
            <button onClick={()=>{setRateDraft(exchangeRate); setEditingRate(true);}} className="text-xs text-gold-500 hover:underline shrink-0">Actualizar tasa</button>
          )}
        </div>
      )}

      {accounts.length===0 && <EmptyState text="Añade tus cuentas bancarias con su saldo actual para ver tu valor neto." onAdd={onAdd} cta="Añadir cuenta"/>}

      {active.length>0 && (
        <div className="flex flex-col gap-3">
          <h3 className="font-medium text-ink-900 dark:text-gray-100">Activas</h3>
          <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
            {active.map(a => <Card key={a.id} a={a}/>)}
          </div>
        </div>
      )}
      {inactive.length>0 && (
        <div className="flex flex-col gap-3 mt-2">
          <h3 className="font-medium text-ink-900 dark:text-gray-100">Desactivas</h3>
          <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
            {inactive.map(a => <Card key={a.id} a={a}/>)}
          </div>
        </div>
      )}
    </div>
  );
}

function IncomeView({ entries, thisMonth, thisYear, expected, onSetExpected, totalCommitted, antThisMonth, antExpenses, onAdd, onEdit, onDelete }) {
  const [year, setYear] = useState(new Date().getFullYear());
  const [showLabels, setShowLabels] = useState(true);
  const [compareMode, setCompareMode] = useState(false);
  const [editingExpected, setEditingExpected] = useState(false);
  const [draft, setDraft] = useState(expected || '');
  const sorted = [...entries].sort((a,b)=> new Date(b.date) - new Date(a.date));

  const years = useMemo(() => {
    const set = new Set(entries.map(e=>new Date(e.date).getFullYear()));
    set.add(new Date().getFullYear());
    return [...set].sort((a,b)=>b-a);
  }, [entries]);

  // totales por mes del año seleccionado (ingresos y gastos hormiga)
  const byMonth = useMemo(() => {
    const inc = Array(12).fill(0), ant = Array(12).fill(0);
    entries.forEach(e => { const d = new Date(e.date); if (d.getFullYear()===year) inc[d.getMonth()] += e.amount; });
    (antExpenses||[]).forEach(e => { const d = new Date(e.date); if (d.getFullYear()===year) ant[d.getMonth()] += e.amount; });
    return inc.map((total, i) => ({
      mes: MESES[i].slice(0,3), mesFull: MESES[i],
      Entradas: Math.round(total*100)/100,
      Salidas: Math.round((ant[i] + (total>0 ? totalCommitted : 0))*100)/100,
    }));
  }, [entries, antExpenses, year, totalCommitted]);

  const monthsWithIncome = byMonth.filter(m=>m.Entradas>0);
  const yearTotal = byMonth.reduce((a,m)=>a+m.Entradas,0);
  const avgMonth = monthsWithIncome.length ? yearTotal / monthsWithIncome.length : 0;
  const bestMonth = monthsWithIncome.length ? monthsWithIncome.reduce((a,b)=> b.Entradas>a.Entradas ? b : a) : null;

  // comparación con el mes anterior
  const now = new Date();
  const curM = now.getMonth();
  const prevTotal = curM > 0 ? byMonth[curM-1].Entradas : 0;
  const delta = thisMonth - prevTotal;
  const deltaPct = prevTotal > 0 ? Math.round((delta/prevTotal)*100) : null;

  // tasa de ahorro de este mes
  const spentThisMonth = totalCommitted + antThisMonth;
  const savedThisMonth = thisMonth - spentThisMonth;
  const savingsRate = thisMonth > 0 ? Math.round((savedThisMonth/thisMonth)*100) : null;
  const rateColor = savingsRate===null ? '#8A8F98' : savingsRate < 0 ? '#EF4444' : savingsRate < 10 ? '#F97316' : '#3DDC97';

  // ingreso esperado vs. real
  const expectedDelta = expected > 0 ? thisMonth - expected : null;
  const saveExpected = () => { onSetExpected(Number(draft) || 0); setEditingExpected(false); };

  // desglose por fuente (año seleccionado)
  const bySource = useMemo(() => {
    const map = {};
    entries.forEach(e => {
      if (new Date(e.date).getFullYear() !== year) return;
      const cat = e.category || 'Otro';
      map[cat] = (map[cat]||0) + e.amount;
    });
    return Object.entries(map).sort((a,b)=>b[1]-a[1]);
  }, [entries, year]);
  const maxSource = bySource.length ? bySource[0][1] : 1;

  return (
    <div className="flex flex-col gap-5">
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <KpiCard label="Entradas este mes" value={fmt(thisMonth)} sub="Suma de lo recibido en el mes" accent="#3DDC97" icon={<IArrowDown size={16}/>}/>
        <KpiCard label="Entradas este año" value={fmt(thisYear)} sub="Suma acumulada del año" accent="#3DDC97" icon={<ICalendar size={16}/>}/>
        <KpiCard label="Media mensual" value={fmt(avgMonth)} sub={`En ${year}, meses con ingresos`} accent={COLORS.gold} icon={<IChart size={16}/>}/>
        <KpiCard label="Tasa de ahorro" value={savingsRate!==null ? `${savingsRate}%` : '—'}
          sub={savingsRate!==null ? `Te quedan ${fmt(savedThisMonth)}` : 'Sin ingresos este mes'}
          accent={rateColor} icon={<IPiggy size={16}/>}/>
      </div>

      {prevTotal > 0 && (
        <div className={`flex items-center gap-2 text-sm rounded-2xl px-4 py-3 border ${delta>=0 ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400' : 'bg-red-500/10 border-red-500/30 text-red-400'}`}>
          {delta>=0 ? '▲' : '▼'}
          <span>
            Este mes llevas {fmt(Math.abs(delta))} {delta>=0 ? 'más' : 'menos'} que en {MESES[curM-1].toLowerCase()}
            {deltaPct!==null && ` (${delta>=0?'+':''}${deltaPct}%)`}.
          </span>
        </div>
      )}

      {/* Ingreso esperado */}
      <div className="bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500/70 rounded-2xl p-5 shadow-soft flex flex-col gap-3">
        <div className="flex items-center justify-between">
          <span className="uppercase tracking-wider text-gray-500 dark:text-gray-400 font-medium">Ingreso esperado / mes</span>
          {!editingExpected && (
            <button onClick={()=>{setDraft(expected||''); setEditingExpected(true);}} className="text-xs text-gold-500 hover:underline">
              {expected > 0 ? 'Cambiar' : 'Definir'}
            </button>
          )}
        </div>
        {editingExpected ? (
          <div className="flex items-center gap-2">
            <input type="number" step="0.01" autoFocus className={inputCls+" max-w-[160px]"} placeholder="Ej. 1500"
              value={draft} onChange={e=>setDraft(e.target.value)} onKeyDown={e=>e.key==='Enter' && saveExpected()}/>
            <button onClick={saveExpected} className="px-3 py-2 rounded-lg bg-gold-500 hover:bg-gold-600 text-ink-900 text-sm font-medium transition">Guardar</button>
            <button onClick={()=>setEditingExpected(false)} className="px-3 py-2 rounded-lg text-gray-500 hover:bg-paper-200 dark:hover:bg-ink-600 text-sm transition">Cancelar</button>
          </div>
        ) : expected > 0 ? (
          <>
            <div className="flex items-baseline justify-between">
              <span className="font-mono text-lg text-ink-900 dark:text-gray-100">{fmt(thisMonth)} <span className="text-gray-500 text-sm">de {fmt(expected)} esperados</span></span>
              <span className={`font-mono text-sm ${expectedDelta>=0 ? 'text-emerald-400':'text-orange-500'}`}>
                {expectedDelta>=0 ? '+' : ''}{fmt(expectedDelta)}
              </span>
            </div>
            <div className="h-2.5 rounded-full bg-paper-200 dark:bg-ink-600 overflow-hidden">
              <div className="h-full rounded-full transition-all"
                style={{width:`${Math.min(Math.round((thisMonth/expected)*100),100)}%`, background: expectedDelta>=0 ? '#3DDC97' : COLORS.gold}}/>
            </div>
            <div className="text-xs text-gray-500">
              {expectedDelta>=0 ? `Ya superaste lo previsto para este mes.` : `Faltan ${fmt(Math.abs(expectedDelta))} para llegar a lo previsto.`}
            </div>
          </>
        ) : (
          <p className="text-sm text-gray-500">Define cuánto esperas que te entre cada mes (ej. tu sueldo) y te comparo lo real contra lo previsto.</p>
        )}
      </div>

      {/* Gráfico */}
      <div className="bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500/70 rounded-2xl p-5 shadow-soft">
        <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
          <span className="uppercase tracking-wider text-gray-500 dark:text-gray-400 font-medium">
            {compareMode ? 'Entradas vs. salidas' : 'Ingresos mensuales'}
          </span>
          <div className="flex flex-wrap items-center gap-2">
            <button onClick={()=>setCompareMode(m=>!m)}
              className={`px-2.5 py-1 rounded-full text-xs transition border ${compareMode ? 'bg-gold-500 text-ink-900 font-medium border-transparent' : 'text-gray-500 border-paper-300 dark:border-ink-500 hover:text-ink-900 dark:hover:text-gray-200'}`}>
              Comparar con gastos
            </button>
            <button onClick={()=>setShowLabels(v=>!v)}
              className={`px-2.5 py-1 rounded-full text-xs transition border ${showLabels ? 'bg-gold-500 text-ink-900 font-medium border-transparent' : 'text-gray-500 border-paper-300 dark:border-ink-500 hover:text-ink-900 dark:hover:text-gray-200'}`}>
              {showLabels ? 'Ocultar números' : 'Mostrar números'}
            </button>
            <div className="flex gap-1.5">
              {years.map(y => (
                <button key={y} onClick={()=>setYear(y)}
                  className={`px-2.5 py-1 rounded-full text-xs font-mono transition ${y===year ? 'bg-gold-500 text-ink-900 font-medium' : 'text-gray-500 hover:bg-paper-200 dark:hover:bg-ink-600'}`}>
                  {y}
                </button>
              ))}
            </div>
          </div>
        </div>
        {yearTotal === 0 ? (
          <p className="text-sm text-gray-500">Sin ingresos registrados en {year}.</p>
        ) : (
          <div className="h-72">
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={byMonth} margin={{top:22, right:8, left:0, bottom:0}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#8A8F9822" vertical={false}/>
                <XAxis dataKey="mes" tick={{fontSize:11, fill:'#8A8F98'}} axisLine={false} tickLine={false}/>
                <YAxis tick={{fontSize:11, fill:'#8A8F98'}} axisLine={false} tickLine={false} tickFormatter={(v)=>`${v}€`}/>
                <Tooltip formatter={(v)=>fmt(v)} cursor={{fill:'#8A8F9811'}}
                  contentStyle={{background:'#1A1D23', border:'1px solid #2A2E37', borderRadius:12, fontSize:12, color:'#E6E8EB'}}/>
                {compareMode && <Legend wrapperStyle={{fontSize:12}}/>}
                <Bar dataKey="Entradas" fill="#3DDC97" radius={[6,6,0,0]} maxBarSize={compareMode?22:44}
                  label={showLabels ? {position:'top', fontSize:10, fill:'#8A8F98', formatter:(v)=> v>0 ? `${Math.round(v)}€` : ''} : false}/>
                {compareMode && (
                  <Bar dataKey="Salidas" fill={COLORS.debt} radius={[6,6,0,0]} maxBarSize={22}
                    label={showLabels ? {position:'top', fontSize:10, fill:'#8A8F98', formatter:(v)=> v>0 ? `${Math.round(v)}€` : ''} : false}/>
                )}
              </BarChart>
            </ResponsiveContainer>
          </div>
        )}
        {compareMode && (
          <p className="text-xs text-gray-500 mt-3">
            Las salidas usan tu compromiso mensual actual ({fmt(totalCommitted)}) más los gastos hormiga de cada mes, así que son una estimación.
          </p>
        )}
      </div>

      {/* Desglose por fuente */}
      {bySource.length > 0 && (
        <div className="bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500/70 rounded-2xl p-5 shadow-soft">
          <span className="uppercase tracking-wider text-gray-500 dark:text-gray-400 font-medium">De dónde viene el dinero ({year})</span>
          <div className="flex flex-col gap-3 mt-3">
            {bySource.map(([cat, val]) => (
              <div key={cat} className="flex flex-col gap-1.5">
                <div className="flex justify-between text-sm">
                  <span>{cat}</span>
                  <span className="font-mono text-gray-500 dark:text-gray-400">{fmt(val)} · {Math.round((val/(yearTotal||1))*100)}%</span>
                </div>
                <div className="h-2 rounded-full bg-paper-200 dark:bg-ink-600 overflow-hidden">
                  <div className="h-full rounded-full transition-all" style={{width:`${Math.round((val/maxSource)*100)}%`, background:'#3DDC97'}}/>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
      {sorted.length===0 ? (
        <EmptyState text="Registra lo que te entra (sueldo, trades, freelance...) sin preocuparte por a qué cuenta va — eso ya lo llevas en Notion." onAdd={onAdd} cta="Nueva entrada"/>
      ) : (
        <div className="flex flex-col gap-2">
          {sorted.map(e => (
            <div key={e.id} className="bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500/70 rounded-2xl p-4 shadow-soft flex items-center gap-4 animate-fadein">
              <span className="text-2xl">💶</span>
              <div className="flex-1 min-w-0">
                <div className="font-medium text-ink-900 dark:text-gray-100 truncate">{e.note || e.category || 'Entrada'}</div>
                <div className="text-gray-500 dark:text-gray-500">{e.category ? `${e.category} · ` : ''}{e.date}</div>
              </div>
              <div className="font-mono text-emerald-400 w-24 text-right">+{fmt(e.amount)}</div>
              <div className="flex gap-1">
                <button onClick={()=>onEdit(e)} className="p-1.5 text-gray-500 hover:text-ink-900 dark:hover:text-gray-200 transition"><IEdit size={16}/></button>
                <button onClick={()=>onDelete(e)} className="p-1.5 text-gray-500 dark:text-gray-500 hover:text-red-400 transition"><ITrash size={16}/></button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
