function TransfersView({ items, accounts, onAdd, onEdit, onDelete }) {
  const sorted = [...items].sort((a,b)=> new Date(b.date) - new Date(a.date));
  const now = new Date();
  const thisMonth = items.filter(t=>isSameMonth(t.date, now)).reduce((a,t)=>a+t.amount,0);
  const nameOf = (id) => { const a = accounts.find(x=>x.id===id); return a ? `${a.emoji} ${a.name}` : '—'; };

  return (
    <div className="flex flex-col gap-5">
      <div className="grid grid-cols-2 gap-4">
        <KpiCard label="Movido este mes" value={fmt(thisMonth)} sub="Entre tus propias cuentas" accent={COLORS.gold} icon={<IRepeat size={16}/>}/>
        <KpiCard label="Transferencias" value={items.length} sub="Registradas en total" accent={COLORS.sub} icon={<IBank size={16}/>}/>
      </div>

      <p className="text-xs text-gray-500 -mt-2 px-1">
        Mover dinero entre tus cuentas no cambia tu valor neto — el dinero sigue siendo tuyo, solo cambia de sitio.
      </p>

      {accounts.length < 2 ? (
        <EmptyState text="Necesitas al menos dos cuentas para poder transferir entre ellas."/>
      ) : sorted.length===0 ? (
        <EmptyState text="Registra un movimiento de dinero de una cuenta tuya a otra." onAdd={onAdd} cta="Nueva transferencia"/>
      ) : (
        <Collapsible title="Movimientos" count={sorted.length}>
          <div className="flex flex-col gap-2">
            {sorted.map(t => (
              <div key={t.id} className="bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500/70 rounded-2xl p-4 shadow-soft flex items-center gap-4 animate-fadein">
                <span className="text-2xl shrink-0">🔄</span>
                <div className="flex-1 min-w-0">
                  <div className="font-medium text-ink-900 dark:text-gray-100 truncate">
                    {nameOf(t.fromAccountId)} <span className="text-gold-500">→</span> {nameOf(t.toAccountId)}
                  </div>
                  <div className="text-gray-500 dark:text-gray-500 text-xs">{fmtDate(t.date)}{t.note ? ` · ${t.note}` : ''}</div>
                </div>
                <div className="font-mono text-ink-900 dark:text-gray-100 shrink-0">{fmt(t.amount)}</div>
                <div className="flex gap-1 shrink-0">
                  <button onClick={()=>onEdit(t)} className="p-1.5 text-gray-500 hover:text-ink-900 dark:hover:text-gray-200 transition"><IEdit size={16}/></button>
                  <button onClick={()=>onDelete(t)} className="p-1.5 text-gray-500 dark:text-gray-500 hover:text-red-400 transition"><ITrash size={16}/></button>
                </div>
              </div>
            ))}
          </div>
        </Collapsible>
      )}
    </div>
  );
}

function AntExpensesView({ entries, thisMonth, thisYear, budget, onSetBudget, onAdd, onEdit, onDelete }) {
  const [editingBudget, setEditingBudget] = useState(false);
  const [draft, setDraft] = useState(budget || '');
  const sorted = [...entries].sort((a,b)=> new Date(b.date) - new Date(a.date));
  const byCategory = useMemo(() => {
    const map = {};
    entries.forEach(e => { map[e.category] = (map[e.category]||0) + e.amount; });
    return Object.entries(map).sort((a,b)=>b[1]-a[1]);
  }, [entries]);
  const maxCat = byCategory.length ? byCategory[0][1] : 1;

  const pct = budget > 0 ? Math.min(Math.round((thisMonth/budget)*100), 100) : 0;
  const over = budget > 0 && thisMonth > budget;
  const near = budget > 0 && !over && thisMonth >= budget*0.8;
  const barColor = over ? '#EF4444' : near ? '#F97316' : '#3DDC97';

  const saveBudget = () => { onSetBudget(Number(draft) || 0); setEditingBudget(false); };

  return (
    <div className="flex flex-col gap-5">
      <div className="grid sm:grid-cols-2 gap-4">
        <KpiCard label="Gastados este mes" value={fmt(thisMonth)} sub="Gastos pequeños del mes" accent={COLORS.debt} icon={<IDrop size={16}/>}/>
        <KpiCard label="Gastados este año" value={fmt(thisYear)} sub="Acumulado del año" accent={COLORS.debt} icon={<ICalendar size={16}/>}/>
      </div>

      <div className="bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500/70 rounded-2xl p-5 shadow-soft flex flex-col gap-3">
        <div className="flex items-center justify-between">
          <span className="uppercase tracking-wider text-gray-500 dark:text-gray-400 font-medium">Presupuesto mensual</span>
          {!editingBudget && (
            <button onClick={()=>{setDraft(budget||''); setEditingBudget(true);}} className="text-xs text-gold-500 hover:underline">
              {budget > 0 ? 'Cambiar' : 'Fijar un tope'}
            </button>
          )}
        </div>

        {editingBudget ? (
          <div className="flex items-center gap-2">
            <input type="number" step="0.01" autoFocus className={inputCls+" max-w-[160px]"} placeholder="Ej. 100"
              value={draft} onChange={e=>setDraft(e.target.value)} onKeyDown={e=>e.key==='Enter' && saveBudget()}/>
            <button onClick={saveBudget} className="px-3 py-2 rounded-lg bg-gold-500 hover:bg-gold-600 text-ink-900 text-sm font-medium transition">Guardar</button>
            <button onClick={()=>setEditingBudget(false)} className="px-3 py-2 rounded-lg text-gray-500 hover:bg-paper-200 dark:hover:bg-ink-600 text-sm transition">Cancelar</button>
          </div>
        ) : budget > 0 ? (
          <>
            <div className="flex items-baseline justify-between">
              <span className="font-mono text-lg text-ink-900 dark:text-gray-100">{fmt(thisMonth)} <span className="text-gray-500 text-sm">de {fmt(budget)}</span></span>
              <span className="font-mono text-sm" style={{color: barColor}}>{pct}%</span>
            </div>
            <div className="h-2.5 rounded-full bg-paper-200 dark:bg-ink-600 overflow-hidden">
              <div className="h-full rounded-full transition-all" style={{width:`${pct}%`, background: barColor}}/>
            </div>
            {over ? (
              <div className="flex items-center gap-1.5 text-red-400 text-xs"><IBell size={13}/> Te pasaste {fmt(thisMonth-budget)} del tope de este mes.</div>
            ) : near ? (
              <div className="flex items-center gap-1.5 text-orange-500 text-xs"><IBell size={13}/> Te quedan solo {fmt(budget-thisMonth)} este mes.</div>
            ) : (
              <div className="text-xs text-gray-500">Te quedan {fmt(budget-thisMonth)} este mes.</div>
            )}
          </>
        ) : (
          <p className="text-sm text-gray-500">Fija un tope mensual y te aviso cuando te acerques. Los gastos pequeños son los que más se escapan sin darse cuenta.</p>
        )}
      </div>

      {byCategory.length>0 && (
        <div className="bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500/70 rounded-2xl p-5 shadow-soft">
          <span className="uppercase tracking-wider text-gray-500 dark:text-gray-400 font-medium">Por categoría</span>
          <div className="flex flex-col gap-3 mt-3">
            {byCategory.map(([cat, val]) => (
              <div key={cat} className="flex flex-col gap-1.5">
                <div className="flex justify-between text-sm"><span>{cat}</span><span className="font-mono text-gray-500 dark:text-gray-400">{fmt(val)}</span></div>
                <div className="h-2 rounded-full bg-paper-200 dark:bg-ink-600 overflow-hidden">
                  <div className="h-full rounded-full transition-all" style={{width:`${Math.round((val/maxCat)*100)}%`, background: COLORS.debt}}/>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {sorted.length===0 ? (
        <EmptyState text="Registra esos gastos pequeños e irregulares (café, antojos, transporte suelto...) para ver cuánto se te va realmente." onAdd={onAdd} cta="Nuevo gasto"/>
      ) : (
        <div className="flex flex-col gap-2">
          {sorted.map(e => (
            <div key={e.id} className="bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500/70 rounded-2xl p-4 shadow-soft flex items-center gap-4 animate-fadein">
              <span className="text-2xl">🐜</span>
              <div className="flex-1 min-w-0">
                <div className="font-medium text-ink-900 dark:text-gray-100 truncate">{e.category}{e.note ? ` · ${e.note}` : ''}</div>
                <div className="text-gray-500 dark:text-gray-500">{e.date}</div>
              </div>
              <div className="font-mono text-red-400 w-24 text-right">-{fmt(e.amount)}</div>
              <div className="flex gap-1">
                <button onClick={()=>onEdit(e)} className="p-1.5 text-gray-500 hover:text-ink-900 dark:hover:text-gray-200 transition"><IEdit size={16}/></button>
                <button onClick={()=>onDelete(e)} className="p-1.5 text-gray-500 dark:text-gray-500 hover:text-red-400 transition"><ITrash size={16}/></button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* =========================================================================
   REPARTO DE INGRESOS (por porcentaje) + SALUD FINANCIERA
   ========================================================================= */
function SplitView({ rules, accounts, incomeAuto, salaryOverride, salaryForSplit, onSetSalaryOverride, onClearSalaryOverride, extraIncome, extraIncomeTotal, liquidezTotal, gastosMensuales, onAdd, onEdit, onDelete, onAddExtraIncome, onEditExtraIncome, onDeleteExtraIncome }) {
  const [editingSalary, setEditingSalary] = useState(false);
  const [salaryDraft, setSalaryDraft] = useState(salaryForSplit);
  const totalIncome = salaryForSplit + (extraIncomeTotal||0);
  const totalPercent = rules.reduce((s,r)=>s+(r.percent||0), 0);
  const remaining = Math.round((100 - totalPercent)*10)/10;
  const accountName = (id) => { const a = (accounts||[]).find(x=>x.id===id); return a ? `${a.emoji} ${a.name}` : 'Sin asignar'; };
  const saveSalary = () => { onSetSalaryOverride(Number(salaryDraft) || 0); setEditingSalary(false); };

  // salud financiera: meses de cobertura si dejaran de entrarte ingresos hoy mismo
  const meses = gastosMensuales > 0 ? liquidezTotal / gastosMensuales : null;
  const mesesRedondeado = meses!==null ? Math.round(meses*100)/100 : null;
  const saludColor = meses===null ? '#8A8F98' : meses < 1 ? '#EF4444' : meses < 3 ? '#F97316' : meses < 6 ? '#C9A227' : '#3DDC97';
  const saludTexto = meses===null ? 'Añade gastos comprometidos para calcularla.'
    : meses < 1 ? 'Menos de un mes de colchón — prioridad alta.'
    : meses < 3 ? 'Colchón corto. La meta habitual son 3–6 meses.'
    : meses < 6 ? 'Vas bien encaminado hacia el colchón recomendado (3–6 meses).'
    : 'Tienes un colchón sólido de 6 meses o más.';

  const distribution = rules.filter(r=>r.percent>0).map((r,i) => ({
    name: r.name, value: Math.round((totalIncome*(r.percent/100))*100)/100, percent: r.percent,
    color: [COLORS.gold, COLORS.sub, COLORS.fixed, COLORS.debt, '#3DDC97', '#8A63D2', '#E2836F'][i % 7],
  }));

  return (
    <div className="flex flex-col gap-5">
      <div className="bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500/70 rounded-2xl p-5 shadow-soft flex flex-col gap-2">
        <span className="uppercase tracking-wider text-gray-500 dark:text-gray-400 font-medium">Salud financiera</span>
        <div className="flex items-baseline gap-2">
          <span className="font-mono text-3xl font-semibold" style={{color:saludColor}}>{mesesRedondeado===null ? '—' : mesesRedondeado}</span>
          <span className="text-gray-500">{mesesRedondeado===null ? '' : (mesesRedondeado===1 ? 'mes de colchón' : 'meses de colchón')}</span>
        </div>
        <p className="text-gray-500 dark:text-gray-500">{saludTexto}</p>
        <div className="flex items-center gap-4 mt-1 text-xs text-gray-500 dark:text-gray-500">
          <span>Liquidez total: <b className="text-gray-700 dark:text-gray-300">{fmt(liquidezTotal)}</b></span>
          <span>÷</span>
          <span>Gastos/mes: <b className="text-gray-700 dark:text-gray-300">{fmt(gastosMensuales)}</b></span>
        </div>
      </div>

      <div className="bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500/70 rounded-2xl p-4 shadow-soft flex flex-col gap-2.5">
        <div className="flex items-center justify-between">
          <span className="uppercase tracking-wider text-gray-500 dark:text-gray-400 font-medium text-xs">Ingresos de este mes a repartir</span>
          <button onClick={onAddExtraIncome} className="flex items-center gap-1.5 text-xs text-gold-500 hover:underline"><IPlus size={13}/> Añadir ingreso</button>
        </div>
        {editingSalary ? (
          <div className="flex items-center justify-between text-sm gap-2">
            <span className="text-gray-700 dark:text-gray-300 shrink-0">Sueldo</span>
            <div className="flex items-center gap-2">
              <input type="number" step="0.01" autoFocus className={inputCls+" max-w-[130px]"} value={salaryDraft} onChange={e=>setSalaryDraft(e.target.value)} onKeyDown={e=>e.key==='Enter' && saveSalary()}/>
              <button onClick={saveSalary} className="px-2.5 py-1.5 rounded-lg bg-gold-500 hover:bg-gold-600 text-ink-900 text-xs font-medium transition">Guardar</button>
              <button onClick={()=>setEditingSalary(false)} className="px-2.5 py-1.5 rounded-lg text-gray-500 hover:bg-paper-200 dark:hover:bg-ink-600 text-xs transition">Cancelar</button>
            </div>
          </div>
        ) : (
          <div className="flex items-center justify-between text-sm">
            <span className="text-gray-700 dark:text-gray-300">Sueldo <span className="text-xs text-gray-500">{salaryOverride!==undefined ? '(puesto a mano este mes)' : '(automático, desde Entradas)'}</span></span>
            <div className="flex items-center gap-2">
              <span className="font-mono text-gray-700 dark:text-gray-300">{fmt(salaryForSplit)}</span>
              <button onClick={()=>{setSalaryDraft(salaryForSplit); setEditingSalary(true);}} className="p-1 text-gray-500 hover:text-ink-900 dark:hover:text-gray-200 transition"><IEdit size={13}/></button>
              {salaryOverride!==undefined && (
                <button onClick={onClearSalaryOverride} title="Volver a automático (desde Entradas)" className="p-1 text-gray-500 hover:text-gold-500 transition"><IBolt size={13}/></button>
              )}
            </div>
          </div>
        )}
        {(extraIncome||[]).map(e => (
          <div key={e.id} className="flex items-center justify-between text-sm">
            <span className="text-gray-700 dark:text-gray-300">{e.name}</span>
            <div className="flex items-center gap-2">
              <span className="font-mono text-gray-700 dark:text-gray-300">{fmt(e.amount)}</span>
              <button onClick={()=>onEditExtraIncome(e)} className="p-1 text-gray-500 hover:text-ink-900 dark:hover:text-gray-200 transition"><IEdit size={13}/></button>
              <button onClick={()=>onDeleteExtraIncome(e)} className="p-1 text-gray-500 hover:text-red-400 transition"><ITrash size={13}/></button>
            </div>
          </div>
        ))}
        <div className="flex items-center justify-between text-sm pt-2 border-t border-paper-300/60 dark:border-ink-500/40 font-medium">
          <span className="text-ink-900 dark:text-gray-100">Total a repartir</span>
          <span className="font-mono text-ink-900 dark:text-gray-100">{fmt(totalIncome)}</span>

      </div>

      <div className="flex items-center justify-between">
        <h3 className="font-medium text-ink-900 dark:text-gray-100">Reparto de tu ingreso de este mes ({fmt(totalIncome)})</h3>
      </div>

      <div className={`text-xs px-3 py-2 rounded-lg ${remaining===0 ? 'bg-emerald-500/10 text-emerald-400' : remaining<0 ? 'bg-red-500/10 text-red-400' : 'bg-gold-500/10 text-gold-500'}`}>
        {remaining===0 ? 'Repartido el 100% de tu ingreso.' : remaining>0 ? `Te queda ${fmtNum(remaining)}% sin repartir (${fmt(totalIncome*(remaining/100))}).` : `Te pasaste ${fmtNum(Math.abs(remaining))}% del 100% — revisa tus reglas.`}
      </div>

      {rules.length===0 ? (
        <EmptyState text="Crea reglas de reparto (ej. Ahorro 64%, Gastos personales 18%...) para saber cuánto mover a cada cuenta cada mes." onAdd={onAdd} cta="Añadir regla"/>
      ) : (
        <div className="grid lg:grid-cols-5 gap-4">
          <div className="lg:col-span-3 flex flex-col gap-3">
            {rules.map(r => (
              <div key={r.id} className="bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500/70 rounded-2xl p-4 shadow-soft flex items-center justify-between gap-3">
                <div className="min-w-0">
                  <div className="font-medium text-ink-900 dark:text-gray-100 truncate">{r.name}</div>
                  <div className="text-xs text-gray-500 truncate">{accountName(r.accountId)}</div>
                </div>
                <div className="flex items-center gap-3 shrink-0">
                  <div className="text-right">
                    <div className="font-mono text-ink-900 dark:text-gray-100">{fmt(totalIncome*(r.percent/100))}</div>
                    <div className="text-xs text-gray-500">{fmtNum(r.percent)}%</div>
                  </div>
                  <div className="flex gap-1">
                    <button onClick={()=>onEdit(r)} className="p-1.5 text-gray-500 hover:text-ink-900 dark:hover:text-gray-200 transition"><IEdit size={16}/></button>
                    <button onClick={()=>onDelete(r)} className="p-1.5 text-gray-500 dark:text-gray-500 hover:text-red-400 transition"><ITrash size={16}/></button>
                  </div>
                </div>
              </div>
            ))}
          </div>
          <div className="lg:col-span-2 bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500/70 rounded-2xl p-5 shadow-soft flex flex-col items-center justify-center">
            {distribution.length>0 ? (
              <>
                <div className="w-full h-52">
                  <ResponsiveContainer width="100%" height="100%">
                    <PieChart>
                      <Pie data={distribution} dataKey="value" nameKey="name" innerRadius={50} outerRadius={80} paddingAngle={3} stroke="none">
                        {distribution.map((d,i)=><Cell key={i} fill={d.color}/>)}
                      </Pie>
                      <Tooltip formatter={(v)=>fmt(v)} contentStyle={{background:'#131722', border:'1px solid #262B38', borderRadius:8, fontSize:12}}/>
                    </PieChart>
                  </ResponsiveContainer>
                </div>
                <div className="flex flex-col gap-1.5 w-full mt-2">
                  {distribution.map((d,i)=>(
                    <div key={i} className="flex items-center justify-between text-sm">
                      <div className="flex items-center gap-2 min-w-0"><span className="w-2.5 h-2.5 rounded-full shrink-0" style={{background:d.color}}/><span className="truncate">{d.name}</span></div>
                      <span className="font-mono text-gray-700 dark:text-gray-300 shrink-0">{fmtNum(d.percent)}%</span>
                    </div>
                  ))}
                </div>
              </>
            ) : <p className="text-sm text-gray-500 text-center py-8">Añade reglas con porcentaje mayor a 0 para ver el gráfico.</p>}
          </div>
        </div>
      )}
    </div>
  );
}

/* =========================================================================
   CALENDARIO
   ========================================================================= */
function CalendarView({ debts, subs, fixed, calMonth, setCalMonth, selectedDay, setSelectedDay }) {
  const { y, m } = calMonth;
  const totalDays = daysInMonth(y,m);
  const firstWeekday = (new Date(y,m,1).getDay()+6)%7; // lunes=0
  const cells = Array.from({length: firstWeekday}).map(()=>null).concat(Array.from({length: totalDays}, (_,i)=>i+1));

  const itemsForDay = (day) => {
    const list = [];
    const today0 = new Date(); today0.setHours(0,0,0,0);
    const occDate = new Date(y, m, day);
    const isPast = occDate < today0;
    debts.forEach(d => {
      const first = new Date(d.firstPaymentDate);
      const monthIndex = y*12+m, firstIndex = first.getFullYear()*12+first.getMonth();
      // si la deuda tiene un número fijo de cuotas (no es "sin fecha límite"), deja de aparecer
      // en el calendario en cuanto el mes cae fuera de esas cuotas — si no, se repite para siempre.
      const withinSchedule = d.noEndDate || !d.totalInstallments || (monthIndex - firstIndex) < d.totalInstallments;
      if (monthIndex >= firstIndex && withinSchedule && clampDay(d.paymentDay,y,m)===day) {
        const paid = isDebtPaidForOccurrence(d, y, m);
        list.push({type:'debt', name:d.name, emoji:d.emoji, amount:d.monthlyPayment, paid, overdue: isPast && !paid});
      }
    });
    subs.forEach(s => {
      if (s.frequency==='annual') {
        if (!s.billingDate) return;
        const anchor = new Date(s.billingDate);
        // antes solo comparaba mes y día, así que aparecía en CUALQUIER año — incluso años antes
        // de su primer cobro real. Ahora exige también que el año no sea anterior al de billingDate.
        if (y >= anchor.getFullYear() && anchor.getMonth()===m && clampDay(anchor.getDate(),y,m)===day) {
          const paid = isRecurringPaidForOccurrence(s, y, m, day);
          list.push({type:'sub', name:s.name, emoji:s.emoji, amount:s.annualPrice, paid, overdue: isPast && !paid});
        }
      } else if (startedByMonth(s.startDate, y, m) && clampDay(s.billingDay,y,m)===day) {
        const paid = isRecurringPaidForOccurrence(s, y, m, day);
        list.push({type:'sub', name:s.name, emoji:s.emoji, amount:s.monthlyPrice, paid, overdue: isPast && !paid});
      }
    });
    fixed.forEach(f => {
      if (f.paymentDay && startedByMonth(f.startDate, y, m) && clampDay(f.paymentDay,y,m)===day) {
        const paid = isFixedPaidForMonth(f, y, m);
        list.push({type:'fixed', name:f.name, emoji:f.emoji, amount:f.monthlyValue, paid, overdue: isPast && !paid});
      } else if (!f.paymentDay && f.lastPaid) {
        // sin día fijo no hay una fecha programada de la que colgarse, así que lo mostramos
        // en el día real en que lo marcaste pagado (nunca como "atrasado", porque no tiene fecha límite)
        const lp = new Date(f.lastPaid);
        if (lp.getFullYear()===y && lp.getMonth()===m && lp.getDate()===day) {
          list.push({type:'fixed', name:f.name, emoji:f.emoji, amount:f.monthlyValue, paid:true, overdue:false});
        }
      }
    });
    return list;
  };

  const changeMonth = (delta) => {
    let nm = m+delta, ny = y;
    if (nm<0){nm=11;ny--;} if(nm>11){nm=0;ny++;}
    setCalMonth({y:ny,m:nm}); setSelectedDay(null);
  };

  const dayList = selectedDay ? itemsForDay(selectedDay) : [];
  const colorFor = (t) => t==='debt'?COLORS.debt:t==='sub'?COLORS.sub:COLORS.fixed;
  const today = new Date();
  const isCurrentMonth = y===today.getFullYear() && m===today.getMonth();
  const goToToday = () => { setCalMonth({y:today.getFullYear(), m:today.getMonth()}); setSelectedDay(today.getDate()); };

  return (
    <div className="flex flex-col gap-5">
      <div className="flex items-center justify-between">
        <h2 className="font-semibold text-ink-900 dark:text-gray-100">{MESES[m]} {y}</h2>
        <div className="flex items-center gap-2">
          {!isCurrentMonth && (
            <button onClick={goToToday} className="text-xs px-3 py-1.5 rounded-lg bg-paper-200 dark:bg-ink-600 text-gray-700 dark:text-gray-300 hover:bg-paper-300 dark:hover:bg-ink-500 transition">Hoy</button>
          )}
          <div className="flex gap-1">
            <button onClick={()=>changeMonth(-1)} className="p-2 rounded-lg hover:bg-paper-200 dark:hover:bg-ink-600 text-gray-500 dark:text-gray-400 transition"><IChevL size={18}/></button>
            <button onClick={()=>changeMonth(1)} className="p-2 rounded-lg hover:bg-paper-200 dark:hover:bg-ink-600 text-gray-500 dark:text-gray-400 transition"><IChevR size={18}/></button>
          </div>
        </div>
      </div>
      <div className="flex flex-wrap gap-4 text-gray-500 dark:text-gray-400">
        <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full" style={{background:COLORS.debt}}/>Deuda</span>
        <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full" style={{background:COLORS.sub}}/>Suscripción</span>
        <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full" style={{background:COLORS.fixed}}/>Gasto fijo</span>
        <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full bg-orange-500"/>Atrasado</span>
      </div>
      <div className="grid grid-cols-7 gap-1.5 text-gray-500 dark:text-gray-500 font-medium">
        {DIAS_SEM.map(d=><div key={d}>{d}</div>)}
      </div>
      <div className="grid grid-cols-7 gap-1.5">
        {cells.map((day,i) => {
          if (!day) return <div key={i}/>;
          const list = itemsForDay(day);
          const hasOverdue = list.some(it=>it.overdue);
          const isToday = new Date().toDateString() === new Date(y,m,day).toDateString();
          return (
            <button key={i} onClick={()=>setSelectedDay(day)}
              className={`min-h-[72px] rounded-xl border p-1.5 flex flex-col items-start gap-0.5 transition-all text-left
              ${hasOverdue ? 'bg-orange-500/15 border-orange-500/50' : selectedDay===day ? 'border-gold-500 bg-gold-500/10' : 'border-paper-300 dark:border-ink-500/60 hover:border-paper-300 dark:hover:border-ink-400'} ${isToday?'ring-1 ring-gold-500/60':''}`}>
              <span className="font-mono text-gray-500 dark:text-gray-400">{day}</span>
              <div className="flex flex-col gap-0.5 w-full">
                {list.slice(0,3).map((it,j)=>(
                  <span key={j} className={`font-mono text-[10px] leading-tight truncate w-full ${it.paid ? 'line-through opacity-60' : ''}`} style={{color: it.overdue ? '#F97316' : colorFor(it.type)}}>{fmtNum(it.amount)}€</span>
                ))}
                {list.length>3 && <span className="text-[10px] text-gray-500">+{list.length-3} más</span>}
              </div>
            </button>
          );
        })}
      </div>
      {selectedDay && (
        <div className="bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500/70 rounded-2xl p-5 shadow-soft animate-fadein">
          <div className="font-medium text-ink-900 dark:text-gray-100 mb-3">Pagos el día {selectedDay}</div>
          {dayList.length ? dayList.map((it,i)=>(
            <div key={i} className="flex items-center gap-3 py-2 border-paper-300/80 dark:border-ink-500/40 first:border-t-0 text-sm">
              <span className="text-lg">{it.emoji}</span>
              <span className="flex-1">{it.name}</span>
              {it.overdue && <span className="text-xs px-2 py-0.5 rounded-full bg-orange-500/15 text-orange-500">Atrasado</span>}
              {it.paid && <span className="text-xs px-2 py-0.5 rounded-full bg-emerald-500/15 text-emerald-400 flex items-center gap-1"><ICheck size={11}/> Pagado</span>}
              <span className="text-xs px-2 py-0.5 rounded-full" style={{background:(it.type==='debt'?COLORS.debt:it.type==='sub'?COLORS.sub:COLORS.fixed)+'22', color:it.type==='debt'?COLORS.debt:it.type==='sub'?COLORS.sub:COLORS.fixed}}>
                {it.type==='debt'?'Deuda':it.type==='sub'?'Suscripción':'Fijo'}
              </span>
              <span className={`font-mono text-gray-700 dark:text-gray-300 ${it.paid ? 'line-through opacity-60' : ''}`}>{fmt(it.amount)}</span>
            </div>
          )) : <div className="text-gray-500 dark:text-gray-500">Sin pagos este día.</div>}
        </div>
      )}
    </div>
  );
}

/* =========================================================================
   ESTADÍSTICAS
   ========================================================================= */
function StatsView({ distribution, projection, totalCommitted, totalDebtMonthly, totalSubMonthly, totalFixedMonthly, history }) {

  const hist = (history||[]).slice(-12);
  const histChart = hist.map(h => {
    const [y,m] = h.key.split('-');
    return { mes: `${MESES[Number(m)-1].slice(0,3)} ${y.slice(2)}`, Comprometido: h.committed, Entradas: h.income, Hormiga: h.ants };
  });
  return (
    <div className="flex flex-col gap-5">
      <div className="grid sm:grid-cols-2 gap-4">
        <KpiCard label="Gasto mensual total" value={fmt(totalCommitted)} accent={COLORS.gold} icon={<IWallet size={16}/>}/>

      <div className="bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500/70 rounded-2xl p-5 shadow-soft">
        <span className="uppercase tracking-wider text-gray-500 dark:text-gray-400 font-medium">Historial mensual</span>

          <>
            <div className="h-64 mt-4">
              <ResponsiveContainer width="100%" height="100%">
                <BarChart data={histChart}>
                  <XAxis dataKey="mes" tick={{fontSize:11, fill:'#8A8F98'}} axisLine={false} tickLine={false}/>
                  <YAxis tick={{fontSize:11, fill:'#8A8F98'}} axisLine={false} tickLine={false}/>
                  <Tooltip formatter={(v)=>fmt(v)} contentStyle={{background:'#1A1D23', border:'1px solid #2A2E37', borderRadius:12, fontSize:12}}/>

                  <Bar dataKey="Entradas" fill="#3DDC97" radius={[4,4,0,0]}/>
                  <Bar dataKey="Comprometido" fill={COLORS.gold} radius={[4,4,0,0]}/>
                  <Bar dataKey="Hormiga" fill={COLORS.debt} radius={[4,4,0,0]}/>

              </ResponsiveContainer>
            </div>
            <div className="flex flex-col gap-1 mt-4">
              {[...hist].reverse().map((h,i,arr) => {
                const prev = arr[i+1];

                    <span className={`font-mono ${h.net>=0?'text-emerald-400':'text-red-400'}`}>{fmt(h.net)}</span>
                    {delta!==null && (
                      <span className={`font-mono text-xs w-20 text-right ${delta>=0?'text-emerald-400':'text-red-400'}`}>
                        {delta>=0?'▲':'▼'} {fmt(Math.abs(delta))}
                      </span>
                    )}
                  </div>
                );
              })}
            </div>
          </>
        )}
      </div>

      <div className="bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500/70 rounded-2xl p-5 shadow-soft">
        <span className="uppercase tracking-wider text-gray-500 dark:text-gray-400 font-medium">Reparto por categoría</span>
        <div className="flex flex-col gap-3 mt-3">
          {[{n:'Deudas',v:totalDebtMonthly,c:COLORS.debt},{n:'Suscripciones',v:totalSubMonthly,c:COLORS.sub},{n:'Gastos fijos',v:totalFixedMonthly,c:COLORS.fixed}].map((row,i)=>(
            <div key={i} className="flex flex-col gap-1.5">
              <div className="flex justify-between text-sm"><span>{row.n}</span><span className="font-mono text-gray-500 dark:text-gray-400">{fmt(row.v)} · {pct(row.v)}%</span></div>
              <div className="h-2 rounded-full bg-paper-200 dark:bg-ink-600 overflow-hidden"><div className="h-full rounded-full transition-all" style={{width:`${pct(row.v)}%`, background:row.c}}/></div>
            </div>
          ))}
        </div>
      </div>

      <div className="bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500/70 rounded-2xl p-5 shadow-soft">
        <span className="uppercase tracking-wider text-gray-500 dark:text-gray-400 font-medium">Proyección — próximos 12 meses</span>
        <p className="text-gray-500 dark:text-gray-500 mt-1 mb-2">Cómo bajará tu compromiso mensual a medida que termines tus deudas actuales (asumiendo que suscripciones y gastos fijos se mantienen).</p>
        <div className="h-64 mt-2">
          <ResponsiveContainer width="100%" height="100%">
            <BarChart data={projection} margin={{left:-16, right:8}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#262B38" vertical={false}/>
              <XAxis dataKey="mes" stroke="#6B7280" fontSize={11} tickLine={false} axisLine={false}/>
              <YAxis stroke="#6B7280" fontSize={11} tickLine={false} axisLine={false}/>
              <Tooltip formatter={(v)=>fmt(v)} contentStyle={{background:'#131722', border:'1px solid #262B38', borderRadius:8, fontSize:12}}/>
              <Bar dataKey="total" radius={[4,4,0,0]} fill={COLORS.gold}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>
    </div>
  );
}

/* =========================================================================
   HISTORIAL
   ========================================================================= */
function HistoryView({ items }) {
  return (
    <div className="flex flex-col gap-4">
      {items.length===0 && <EmptyState text="Todavía no has terminado de pagar ninguna deuda. Cuando lo hagas, aparecerá aquí."/>}
      {items.map(d=>{
        const duration = monthsBetween(d.firstPaymentDate, d.finishedDate || todayISO());
        return (
          <div key={d.id} className="bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500/70 rounded-2xl p-5 shadow-soft flex items-center gap-4 animate-fadein">
            <span className="text-2xl">{d.emoji}</span>
            <div className="flex-1 min-w-0">
              <div className="font-medium text-ink-900 dark:text-gray-100">{d.name}</div>
              <div className="text-gray-500 dark:text-gray-500">Iniciada: {d.firstPaymentDate} · Finalizada: {d.finishedDate}</div>
            </div>
            <div className="text-right">
              <div className="font-mono text-ink-900 dark:text-gray-100">{fmt(d.totalValue)}</div>
              <div className="text-gray-500 dark:text-gray-500">{duration} meses para pagarla</div>
            </div>
            <ICheck size={20} className="text-emerald-400 shrink-0"/>
          </div>
        );
      })}
    </div>
  );
}

/* =========================================================================
   AUTENTICACIÓN
   ========================================================================= */
function AuthScreen() {
  const [mode, setMode] = useState('login'); // 'login' | 'signup'
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [busy, setBusy] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setBusy(true);
    try {
      if (mode === 'login') await auth.signInWithEmailAndPassword(email, password);
      else await auth.createUserWithEmailAndPassword(email, password);
    } catch (err) {
      const messages = {
        'auth/invalid-email': 'Correo no válido.',
        'auth/user-not-found': 'No existe una cuenta con ese correo.',
        'auth/wrong-password': 'Contraseña incorrecta.',
        'auth/email-already-in-use': 'Ya existe una cuenta con ese correo.',
        'auth/weak-password': 'La contraseña debe tener al menos 6 caracteres.',
        'auth/invalid-credential': 'Correo o contraseña incorrectos.',
      };
      setError(messages[err.code] || 'Ocurrió un error. Intenta de nuevo.');
    } finally { setBusy(false); }
  };

  return (
    <div className="min-h-screen bg-paper-100 dark:bg-ink-900 flex items-center justify-center p-4">
      <div className="w-full max-w-sm bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500/70 rounded-2xl shadow-soft p-7 animate-fadein">
        <div className="flex items-center gap-2 mb-6 justify-center">
          <div className="w-8 h-8 rounded-lg bg-gold-500 flex items-center justify-center text-ink-900 font-mono font-bold">L</div>
          <span className="font-mono text-lg tracking-tight text-ink-900 dark:text-gray-100 font-semibold">LEDGER<span className="text-gold-500">.</span></span>
        </div>
        <h2 className="text-center text-sm text-gray-500 mb-6">{mode==='login' ? 'Inicia sesión para ver tus compromisos' : 'Crea tu cuenta para empezar'}</h2>
        <form onSubmit={submit} className="flex flex-col gap-4">
          <Field label="Correo electrónico">
            <input type="email" required value={email} onChange={e=>setEmail(e.target.value)} className={inputCls} placeholder="tucorreo@ejemplo.com"/>
          </Field>
          <Field label="Contraseña">
            <input type="password" required minLength={6} value={password} onChange={e=>setPassword(e.target.value)} className={inputCls} placeholder="Mínimo 6 caracteres"/>
          </Field>
          {error && <div className="text-xs text-red-400 bg-red-500/10 border border-red-500/30 rounded-lg px-3 py-2">{error}</div>}
          <button type="submit" disabled={busy} className="bg-gold-500 hover:bg-gold-600 disabled:opacity-60 text-ink-900 font-medium text-sm py-2.5 rounded-lg transition">
            {busy ? 'Un momento…' : mode==='login' ? 'Iniciar sesión' : 'Crear cuenta'}
          </button>
        </form>
        <button onClick={()=>{setMode(m=>m==='login'?'signup':'login'); setError('');}} className="w-full text-center text-xs text-gray-500 hover:text-gold-500 transition mt-5">
          {mode==='login' ? '¿No tienes cuenta? Crear una' : '¿Ya tienes cuenta? Iniciar sesión'}
        </button>
      </div>
    </div>
  );
}

function SetupNeeded() {
  return (
    <div className="min-h-screen bg-ink-900 flex items-center justify-center p-6 text-center">
      <div className="max-w-md">
        <div className="text-gold-500 font-mono text-lg mb-3">Falta configurar Firebase</div>
        <p className="text-gray-400 text-sm">Reemplaza los valores de <code className="text-gray-300">firebaseConfig</code> al inicio del archivo por los de tu proyecto Firebase (Consola → Configuración del proyecto → Tus apps → Web), guarda el archivo y vuelve a abrirlo.</p>
      </div>
    </div>
  );
}

function Root() {
  const [authChecked, setAuthChecked] = useState(false);
  const [user, setUser] = useState(null);

  useEffect(() => {
    if (!FIREBASE_READY) { setAuthChecked(true); return; }
    const unsub = auth.onAuthStateChanged(u => { setUser(u); setAuthChecked(true); });
    return unsub;
  }, []);

  if (!FIREBASE_READY) return <SetupNeeded/>;
  if (!authChecked) return <div className="min-h-screen bg-ink-900 flex items-center justify-center text-gray-500 font-mono text-sm">Cargando ledger…</div>;
  if (!user) return <AuthScreen/>;
  return <App userId={user.uid} isAdmin={user.email === 'jeffersonshuguli@gmail.com'} onLogout={()=>auth.signOut()}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
