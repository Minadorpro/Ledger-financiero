   UTILIDADES
   ========================================================================= */
function uid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }

// Multi-moneda: cada cuenta puede tener su propia divisa. Deudas/suscripciones/gastos fijos/entradas
// siguen siempre en EUR (así los introduces), así que para el valor neto y para cuando se les
// vincula un pago automático, convertimos usando el tipo de cambio que tú mismo fijas y actualizas.
const CURRENCIES = {
  EUR: { symbol:'€', locale:'es-ES', label:'Euro (€)' },
  USD: { symbol:'$', locale:'en-US', label:'Dólar (USD $)' },
};
function fmtCur(n, currency) {
  const v = Number(n) || 0;
  const cur = CURRENCIES[currency] || CURRENCIES.EUR;
  return v.toLocaleString(cur.locale, { style:'currency', currency: currency || 'EUR', maximumFractionDigits: 2 });
}
// convierte un importe en EUR a la divisa de la cuenta (rate = cuántos EUR vale 1 USD)
function eurToAccountCurrency(eurAmount, account, rate) {
  if (!account || account.currency!=='USD') return eurAmount;
  return (rate>0) ? eurAmount / rate : eurAmount;
}
// convierte el saldo de una cuenta (en su propia divisa) a EUR, para sumar valor neto entre cuentas
function accountBalanceInEur(account, rate) {
  const bal = account.balance || 0;
  return account.currency==='USD' ? bal * (rate>0 ? rate : 1) : bal;
}

function fmt(n) {
  const v = Number(n) || 0;
  return v.toLocaleString('es-ES', { style:'currency', currency:'EUR', maximumFractionDigits: 2 });
}
function fmtNum(n) { return (Number(n)||0).toLocaleString('es-ES', {maximumFractionDigits:2}); }

function todayISO() { return new Date().toISOString().slice(0,10); }
// medianoche de AYER — corte usado por el motor de saldos: nada anterior a esto mueve el saldo de una cuenta
function yesterdayStart() {
  const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-1);
  return d;
}
// fecha legible con año — para movimientos históricos (ej. "15 jul 2026")
function fmtDate(d) {
  return new Date(d).toLocaleDateString('es-ES', { day:'numeric', month:'short', year:'numeric' });
}

function daysInMonth(y, m) { return new Date(y, m+1, 0).getDate(); }

function clampDay(day, y, m) { return Math.min(day, daysInMonth(y,m)); }

// próxima fecha en que cae un "día de pago" respecto de hoy
function nextOccurrence(paymentDay) {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth(), d = now.getDate();
  let targetY = y, targetM = m;
  const dayThisMonth = clampDay(paymentDay, y, m);
  if (d > dayThisMonth) { targetM += 1; if (targetM > 11) { targetM = 0; targetY += 1; } }
  const targetDay = clampDay(paymentDay, targetY, targetM);
  const target = new Date(targetY, targetM, targetDay);
  const diffMs = target.setHours(0,0,0,0) - new Date(y,m,d).setHours(0,0,0,0);
  const daysUntil = Math.round(diffMs / 86400000);
  return { date: target, daysUntil };
}

// próximo pago programado de una deuda: respeta la fecha del PRIMER pago (no solo el día del mes),
// así que si el primer pago todavía no llega, no la marca como "vence hoy" antes de tiempo
function nextDebtOccurrence(debt) {
  const today = new Date(); today.setHours(0,0,0,0);
  const first = new Date(debt.firstPaymentDate); first.setHours(0,0,0,0);
  // firstPaymentDate solo marca DESDE QUÉ MES arranca la deuda; el día del mes lo manda siempre
  // paymentDay (mismo criterio que usan el Calendario y el motor de pagos), así que si editas
  // "Día del mes de pago" se refleja aquí también, sin tener que tocar también la fecha del primer pago.
  let y = first.getFullYear(), m = first.getMonth();
  let cursor = new Date(y, m, clampDay(debt.paymentDay, y, m));
  while (cursor < today) {
    m++; if (m > 11) { m = 0; y++; }
    cursor = new Date(y, m, clampDay(debt.paymentDay, y, m));
  }
  const daysUntil = Math.round((cursor.getTime() - today.getTime()) / 86400000);
  return { date: cursor, daysUntil };
}

// próxima fecha en que cae un aniversario anual (para suscripciones anuales)
function nextAnnualOccurrence(dateISO) {
  const now = new Date();
  const anchor = new Date(dateISO);
  const month = anchor.getMonth();
  const y = now.getFullYear();
  let targetY = y;
  const dayThisYear = clampDay(anchor.getDate(), targetY, month);
  let target = new Date(targetY, month, dayThisYear);
  target.setHours(0,0,0,0);
  const today0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if (target < today0) { targetY += 1; const day = clampDay(anchor.getDate(), targetY, month); target = new Date(targetY, month, day); }
  const daysUntil = Math.round((target.setHours(0,0,0,0) - today0.getTime()) / 86400000);
  return { date: target, daysUntil };
}

function monthsBetween(startISO, endISO) {
  const s = new Date(startISO), e = new Date(endISO);
  return Math.max(1, (e.getFullYear()-s.getFullYear())*12 + (e.getMonth()-s.getMonth()) + 1);
}

function addMonths(date, n) { const d = new Date(date); d.setMonth(d.getMonth()+n); return d; }

// cuántas cuotas "deberían" estar pagadas a hoy, según la fecha del primer pago (para modo automático)
// cuenta solo los pagos programados (primer pago, +1 mes, +2 meses...) cuya fecha ya pasó
function elapsedInstallments(debt) {
  const today = new Date(); today.setHours(0,0,0,0);
  let cursor = new Date(debt.firstPaymentDate); cursor.setHours(0,0,0,0);
  if (today < cursor) return 0;
  let count = 0;
  const total = debt.totalInstallments || 0;
  while (cursor <= today && count < total) {
    count++;
    cursor = addMonths(cursor, 1);
  }
  return count;
}

// cuánto llevas pagado efectivamente: automático se calcula solo, manual usa lo guardado
function effectivePaid(debt) {
  if (debt.noEndDate) return debt.paidInstallments || 0;
  return debt.mode === 'auto' ? elapsedInstallments(debt) : debt.paidInstallments;
}

// ¿ya empezó esta deuda a día de hoy? (el mes de la primera cuota ya llegó o pasó)
function debtStarted(debt) {
  const first = new Date(debt.firstPaymentDate);
  const now = new Date();
  return (now.getFullYear()*12 + now.getMonth()) >= (first.getFullYear()*12 + first.getMonth());
}

// ¿ya llegó el mes de inicio de este ítem, para el mes (y,m) dado? (sin fecha registrada = se asume que ya empezó, por compatibilidad con datos previos)
function startedByMonth(startDateISO, y, m) {
  if (!startDateISO) return true;
  const start = new Date(startDateISO);
  return (y*12+m) >= (start.getFullYear()*12+start.getMonth());
}

// ¿el próximo pago de este día-de-mes todavía cae dentro del mes actual? (si el día ya pasó, la próxima ocurrencia salta al mes siguiente y ya no "pertenece" a este mes)
function occursThisMonth(paymentDay, startDate) {
  const { date } = nextOccurrence(paymentDay);
  const now = new Date();
  if (!(date.getFullYear()===now.getFullYear() && date.getMonth()===now.getMonth())) return false;
  return startedByMonth(startDate, now.getFullYear(), now.getMonth());
}
// misma idea, pero para deudas (respeta la fecha del primer pago, no solo el día del mes)
function debtOccursThisMonth(debt) {
  const { date } = nextDebtOccurrence(debt);
  const now = new Date();
  return date.getFullYear()===now.getFullYear() && date.getMonth()===now.getMonth();
}

function isSameMonth(dateISO, ref) { const d = new Date(dateISO); return d.getFullYear()===ref.getFullYear() && d.getMonth()===ref.getMonth(); }
function isSameYear(dateISO, ref) { return new Date(dateISO).getFullYear()===ref.getFullYear(); }

// inicio del ciclo mensual actual (la última vez que cayó el día de pago, hoy incluido)
function currentCycleStart(paymentDay) {
  const now = new Date(); const y=now.getFullYear(), m=now.getMonth(), d=now.getDate();
  const dayThisMonth = clampDay(paymentDay,y,m);
  if (d >= dayThisMonth) return new Date(y,m,dayThisMonth);
  let pm=m-1, py=y; if (pm<0){pm=11; py--;}
  return new Date(py,pm,clampDay(paymentDay,py,pm));
}
// inicio del ciclo anual actual (para suscripciones anuales)
function currentAnnualCycleStart(dateISO) {
  const anchor = new Date(dateISO); const now = new Date(); const y = now.getFullYear();
  const thisYearDate = new Date(y, anchor.getMonth(), clampDay(anchor.getDate(), y, anchor.getMonth()));
  if (now >= thisYearDate) return thisYearDate;
  return new Date(y-1, anchor.getMonth(), clampDay(anchor.getDate(), y-1, anchor.getMonth()));
}
// ¿ya se marcó como pagado en el ciclo actual? (para suscripciones, gastos fijos y tarjetas sin fecha límite)
function isPaidThisCycle(item) {
  if (!item.lastPaid) return false;
  const lastPaid = new Date(item.lastPaid); lastPaid.setHours(0,0,0,0);
  if (item.frequency==='annual' && item.billingDate) return lastPaid >= currentAnnualCycleStart(item.billingDate);
  const day = item.paymentDay || item.billingDay;
  if (day) return lastPaid >= currentCycleStart(day);
  return isSameMonth(item.lastPaid, new Date());
}

// ¿cuenta esta deuda en el total comprometido de ESTE mes?
// regla única: solo si su PRÓXIMO pago cae dentro del mes actual.
// (si la cuota de este mes ya se pagó, su próximo pago salta al mes siguiente → ya pertenece a ese mes, no a este)
function debtCountsThisMonth(debt) {
  return debtOccursThisMonth(debt);
}
// misma regla para un gasto fijo con día
function fixedCountsThisMonth(f) {
  return occursThisMonth(f.paymentDay, f.startDate);
}
function installmentIndexAt(debt, y, m) {
  const targetEnd = new Date(y, m, clampDay(debt.paymentDay, y, m)); targetEnd.setHours(0,0,0,0);
  let cursor = new Date(debt.firstPaymentDate); cursor.setHours(0,0,0,0);
  if (targetEnd < cursor) return 0;
  let count = 0;
  const cap = debt.totalInstallments || Infinity;
  while (cursor <= targetEnd && count < cap) { count++; cursor = addMonths(cursor, 1); }
  return count;
}
// ¿está pagada la ocurrencia de esta deuda en el mes (y,m) del calendario?
function isDebtPaidForOccurrence(debt, y, m) {
  const occ = new Date(y, m, clampDay(debt.paymentDay, y, m)); occ.setHours(0,0,0,0);
  const today0 = new Date(); today0.setHours(0,0,0,0);
  if (debt.mode === 'auto') return occ <= today0; // "automático" solo se da por pagado una vez que la fecha ya llegó
  if (debt.noEndDate) {
    if (!debt.lastPaid) return false;
    const prevOcc = addMonths(occ, -1);
    const lastPaid = new Date(debt.lastPaid);
    return lastPaid > prevOcc && lastPaid <= addMonths(occ, 1);
  }
  const idx = installmentIndexAt(debt, y, m);
  return idx > 0 && idx <= effectivePaid(debt);
}
// ¿está pagada la ocurrencia de una suscripción/gasto fijo en el mes (y,m)?
function isRecurringPaidForOccurrence(item, y, m, day) {
  const occ = new Date(y, m, day); occ.setHours(0,0,0,0);
  const today0 = new Date(); today0.setHours(0,0,0,0);
  if (item.mode === 'auto') return occ <= today0;
  if (!item.lastPaid) return false;
  const prevOcc = addMonths(occ, -1);
  const lastPaid = new Date(item.lastPaid);
  return lastPaid > prevOcc && lastPaid <= addMonths(occ, 1);
}

// para GASTOS FIJOS el registro real de pagos es la barra de 12 meses (paidMonths), así que el calendario la consulta a ella
function isFixedPaidForMonth(f, y, m) {
  const occ = new Date(y, m, clampDay(f.paymentDay, y, m)); occ.setHours(0,0,0,0);
  const today0 = new Date(); today0.setHours(0,0,0,0);
  if (f.mode === 'auto') return occ <= today0;
  const key = `${y}-${String(m+1).padStart(2,'0')}`;
  return (f.paidMonths||[]).includes(key);
}

function downloadBlob(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function csvEscape(v) {
  const s = String(v ?? '');
  return /[",\n;]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
}

// ¿qué meses del año actual (enero-diciembre) están pagados para este ítem?
function yearProgressMonths(item) {
  const now = new Date();
  const year = now.getFullYear();
  const curM = now.getMonth();
  const months = [];
  for (let m=0; m<12; m++) {
    const started = startedByMonth(item.startDate, year, m);
    let filled;
    if (item.mode === 'auto') {
      filled = started && m <= curM; // automático: se da por pagado cada mes que ya pasó
    } else {
      const key = `${year}-${String(m+1).padStart(2,'0')}`;
      filled = started && (item.paidMonths||[]).includes(key);
    }
    months.push(filled);
  }
  return months;
}

function addPaidMonth(existing, key) {
  if (!key) { const now = new Date(); key = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`; }
  const list = existing ? [...existing] : [];
  if (!list.includes(key)) list.push(key);
  return list;
}

// al fijar (o cambiar) la fecha de inicio, rellena hacia atrás los meses ya transcurridos de este año (no borra marcas existentes, solo añade)
function backfillPaidMonths(startDateISO, existing) {
  const list = existing ? [...existing] : [];
  if (!startDateISO) return list;
  const now = new Date();
  const start = new Date(startDateISO);
  let y = start.getFullYear(), m = start.getMonth();
  if (y < now.getFullYear()) { y = now.getFullYear(); m = 0; } // solo nos interesa el año en curso
  const endIdx = now.getFullYear()*12 + now.getMonth();
  while (y*12+m <= endIdx) {
    const key = `${y}-${String(m+1).padStart(2,'0')}`;
    if (!list.includes(key)) list.push(key);
    m++; if (m>11) { m=0; y++; }
  }
  return list;
}

function SavingsEntryForm({ initial, projects, accounts, onSave, onClose }) {
  const [f, setF] = useState(initial || { amount:'', date: todayISO(), projectId:'', fromAccountId:'', toAccountId:'', note:'' });
  const set = (k,v) => setF(s=>({...s,[k]:v}));
  const isEdit = !!(initial && initial.id);
  const sameAccount = f.fromAccountId && f.toAccountId && f.fromAccountId === f.toAccountId;
  const submit = (e) => {
    e.preventDefault();
    if (!f.amount || sameAccount) return;
    onSave({
      ...f,
      amount: Number(f.amount),
      projectId: f.projectId || null,
      fromAccountId: f.fromAccountId || null,
      toAccountId: f.toAccountId || null,
    });
  };
  const opts = (accounts||[]);
  // si el proyecto elegido está vinculado a una cuenta, el destino queda fijado a esa cuenta
  const selectedProject = projects.find(p=>p.id===f.projectId);
  const lockedAccount = selectedProject && selectedProject.accountId
    ? opts.find(a=>a.id===selectedProject.accountId)
    : null;
  return (
    <form onSubmit={submit} className="flex flex-col gap-4">
      <div className="grid grid-cols-2 gap-4">
        <Field label="Monto ahorrado (€)">
          <input type="number" step="0.01" className={inputCls} value={f.amount} onChange={e=>set('amount', e.target.value)} required/>
        </Field>
        <Field label="Fecha">
          <input type="date" className={inputCls} value={f.date} onChange={e=>set('date', e.target.value)}/>
        </Field>
      </div>

      <div className="grid grid-cols-2 gap-4">
        <Field label="Cuenta (de dónde sale)">
          <select className={inputCls} value={f.fromAccountId} onChange={e=>set('fromAccountId', e.target.value)}>
            <option value="">Sin asignar</option>
            {opts.map(a => <option key={a.id} value={a.id}>{a.emoji} {a.name}</option>)}
          </select>
        </Field>
        <Field label="Destino (a dónde va)">
          <select className={inputCls} value={f.toAccountId} onChange={e=>set('toAccountId', e.target.value)} disabled={!!lockedAccount}>
            <option value="">Sin asignar</option>
            {opts.map(a => <option key={a.id} value={a.id}>{a.emoji} {a.name}</option>)}
          </select>
          {lockedAccount && (
            <p className="text-xs text-gold-500 mt-1.5">
              Fijado por el proyecto: el dinero irá a {lockedAccount.emoji} {lockedAccount.name}.
            </p>
          )}
        </Field>
      </div>
      {sameAccount && (
        <p className="text-xs text-red-400 -mt-2">La cuenta de origen y la de destino no pueden ser la misma.</p>
      )}
      {!isEdit && (f.fromAccountId || f.toAccountId) && (
        <p className="text-xs text-gray-500 -mt-2">
          Al guardar, se descontará el monto de la cuenta de origen y se sumará a la de destino.
        </p>
      )}
      {isEdit && (
        <p className="text-xs text-gray-500 -mt-2">
          Al editar, los saldos se ajustan solos a los nuevos valores.
        </p>
      )}

      <Field label="Destinar a proyecto (opcional)">
        <select className={inputCls} value={f.projectId} onChange={e=>{
          const pid = e.target.value;
          const proj = projects.find(p=>p.id===pid);
          // si el proyecto tiene cuenta vinculada, la ponemos como destino automáticamente
          setF(s => ({...s, projectId: pid, toAccountId: proj && proj.accountId ? proj.accountId : s.toAccountId}));
        }}>
          <option value="">Sin destino específico</option>
          {projects.map(p => <option key={p.id} value={p.id}>{p.emoji} {p.name}</option>)}
        </select>
      </Field>
      <Field label="Nota (opcional)">
        <input className={inputCls} value={f.note} onChange={e=>set('note', e.target.value)} placeholder="Ej. Bono de diciembre"/>
      </Field>
      <div className="flex justify-end gap-2 mt-2">
        <button type="button" onClick={onClose} className="px-4 py-2 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-paper-200 dark:hover:bg-ink-600 transition">Cancelar</button>
        <button type="submit" disabled={sameAccount} className="px-4 py-2 rounded-lg bg-gold-500 hover:bg-gold-600 text-ink-900 font-medium transition disabled:opacity-50">Guardar ahorro</button>
      </div>
    </form>
  );
}

/* =========================================================================
   APP
   ========================================================================= */
function App({ userId, isAdmin, onLogout }) {
  const isOwner = isAdmin; // solo el dueño recibe la migración de cuentas iniciales
  const [loaded, setLoaded] = useState(false);
  const [theme, setTheme] = useState('dark');
  const [debts, setDebts] = useState([]);
  const [subscriptions, setSubscriptions] = useState([]);
  const [fixedExpenses, setFixedExpenses] = useState([]);
  const [savingsProjects, setSavingsProjects] = useState([]);
  const [savingsEntries, setSavingsEntries] = useState([]);
  const [incomeEntries, setIncomeEntries] = useState([]);
  const [antExpenses, setAntExpenses] = useState([]);
  const [antBudget, setAntBudget] = useState(0);
  const [incomeSplitRules, setIncomeSplitRules] = useState([]); // reparto de ingresos por porcentaje
  const [financialGoals, setFinancialGoals] = useState([]); // metas de valor neto
  const [extraIncome, setExtraIncome] = useState([]); // ingresos manuales extra (ej. trading) para el reparto
  const [salaryOverrides, setSalaryOverrides] = useState({}); // { "2026-07": 1200 } — sueldo puesto a mano ese mes, para el Reparto
  const [exchangeRate, setExchangeRate] = useState(0.92); // cuántos EUR vale 1 USD — lo actualizas tú manualmente
  const [expectedIncome, setExpectedIncome] = useState(0);
  const [accounts, setAccounts] = useState([]);
  const [accountsInit, setAccountsInit] = useState(false);
  const [transfers, setTransfers] = useState([]);
  const [appliedPayments, setAppliedPayments] = useState(null); // claves de pagos ya descontados de las cuentas
  const [saveError, setSaveError] = useState(null); // mensaje visible si falla el guardado en Firestore
  const [monthlyHistory, setMonthlyHistory] = useState([]);
  const [view, setView] = useState('dashboard');
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [modal, setModal] = useState(null); // {type:'debt'|'sub'|'fixed'|'project'|'saving', item?}
  const [openAccountId, setOpenAccountId] = useState(null); // cuenta abierta como página completa (vista 'accountDetail')
  const [confirmDel, setConfirmDel] = useState(null); // {type, id, name}
  const [globalSearch, setGlobalSearch] = useState('');
  const [searchOpen, setSearchOpen] = useState(false);
  const [calMonth, setCalMonth] = useState(() => { const d = new Date(); return {y:d.getFullYear(), m:d.getMonth()}; });
  const [calSelectedDay, setCalSelectedDay] = useState(null);

  const store = useMemo(() => makeDataStore(userId), [userId]);

  // cargar datos al montar (o si cambia el usuario)
  useEffect(() => {
    setLoaded(false);
    (async () => {
      const saved = await store.load();
      const data = saved || seedData();
      setDebts(data.debts || []);
      setSubscriptions(data.subscriptions || []);
      setFixedExpenses(data.fixedExpenses || []);
      setSavingsProjects(data.savingsProjects || []);
      setSavingsEntries(data.savingsEntries || []);
      setIncomeEntries(data.incomeEntries || []);
      setAntExpenses(data.antExpenses || []);
      setAntBudget(data.antBudget || 0);
      setIncomeSplitRules(data.incomeSplitRules || []);
      setFinancialGoals(data.financialGoals || []);
      setExtraIncome(data.extraIncome || []);
      setSalaryOverrides(data.salaryOverrides || {});
      setExchangeRate(data.exchangeRate || 0.92);
      setExpectedIncome(data.expectedIncome || 0);
      // migración puntual SOLO para el dueño de la app: sus cuentas ya existían antes de esta sección.
      // cualquier otro usuario empieza con la lista vacía y crea las suyas.
      const needsAccounts = isOwner && !data.accountsInit && (!data.accounts || data.accounts.length === 0);
      setAccounts(needsAccounts ? DEFAULT_ACCOUNTS() : (data.accounts || []));
      setAccountsInit(true);
      setTransfers(data.transfers || []);
      setAppliedPayments(data.appliedPayments || null);
      setMonthlyHistory(data.monthlyHistory || []);
      setTheme(data.theme || 'dark');
      setLoaded(true);
    })();
  }, [store]);

  // guardar cuando cambie algo — con un pequeño margen (debounce): una edición dispara varios
  // cambios en cadena (el ítem → el motor de saldos → la cuenta), y sin este margen cada uno
  // lanzaba su propio guardado a Firestore por separado; si llegaban fuera de orden, el guardado
  // bueno (el ya corregido) podía quedar pisado por uno anterior con datos viejos.
  const latestSnapshotRef = useRef(null);
  useEffect(() => {
    latestSnapshotRef.current = { debts, subscriptions, fixedExpenses, savingsProjects, savingsEntries, incomeEntries, antExpenses, antBudget, incomeSplitRules, financialGoals, extraIncome, salaryOverrides, expectedIncome, accounts, accountsInit, transfers, appliedPayments, monthlyHistory, theme, exchangeRate };
  });
  useEffect(() => {
    if (!loaded) return;
    const t = setTimeout(() => {
      store.save({ debts, subscriptions, fixedExpenses, savingsProjects, savingsEntries, incomeEntries, antExpenses, antBudget, incomeSplitRules, financialGoals, extraIncome, salaryOverrides, expectedIncome, accounts, accountsInit, transfers, appliedPayments, monthlyHistory, theme, exchangeRate })
        .then(() => setSaveError(null))
        .catch(e => { console.error('No se pudo guardar en Firestore', e); setSaveError(e && e.message ? e.message : String(e)); });
    }, 150);
    return () => clearTimeout(t);
  }, [debts, subscriptions, fixedExpenses, savingsProjects, savingsEntries, incomeEntries, antExpenses, antBudget, incomeSplitRules, financialGoals, extraIncome, salaryOverrides, expectedIncome, accounts, accountsInit, transfers, appliedPayments, monthlyHistory, theme, exchangeRate, loaded, store]);

  // red de seguridad: si la página se cierra, se recarga o se cambia de pestaña ANTES de que
  // el margen de arriba llegue a disparar el guardado, forzamos un guardado inmediato con lo
  // último que haya en memoria. Así una recarga rápida justo después de editar no pierde el cambio.
  useEffect(() => {
    const flush = () => { if (latestSnapshotRef.current) store.save(latestSnapshotRef.current).catch(e=>console.error('No se pudo guardar (flush)', e)); };
    window.addEventListener('beforeunload', flush);
    window.addEventListener('pagehide', flush);
    document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') flush(); });
    return () => {
      window.removeEventListener('beforeunload', flush);
      window.removeEventListener('pagehide', flush);
    };
  }, [store]);

  // deudas en modo automático: al cargar, ponemos al día las cuotas pagadas según la fecha
  useEffect(() => {
    if (!loaded) return;
    setDebts(list => list.map(d => {
      if (d.finished || d.noEndDate || d.mode !== 'auto') return d;
      const elapsed = elapsedInstallments(d);
      if (elapsed <= d.paidInstallments) return d;
      const finished = elapsed >= d.totalInstallments;
      return { ...d, paidInstallments: elapsed, finished, finishedDate: finished ? todayISO() : null };
    }));
    // eslint-disable-next-line
  }, [loaded]);

  const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');

  /* ---------- acciones CRUD ---------- */
  const upsertDebt = (item) => {
    setDebts(list => item.id ? list.map(d=>d.id===item.id? {...d,...item} : d) : [...list, {...item, id:uid(), finished:false}]);
    setModal(null);
  };
  const upsertSub = (item) => {
    setSubscriptions(list => item.id ? list.map(d=>d.id===item.id? {...d,...item} : d) : [...list, {...item, id:uid()}]);
    setModal(null);
  };
  const upsertFixed = (item) => {
    const prepared = (item.mode!=='auto' && !item.noPaymentDay && item.startDate)
      ? { ...item, paidMonths: backfillPaidMonths(item.startDate, item.paidMonths) }
      : item;
    setFixedExpenses(list => prepared.id ? list.map(d=>d.id===prepared.id? {...d,...prepared} : d) : [...list, {...prepared, id:uid()}]);
    setModal(null);
  };
  // los gastos fijos CON día se descuentan solos vía el motor automático (duePayments), que se basa
  // en paymentDay. Los que NO tienen día fijo quedan fuera de ese motor (no hay una fecha de la que
  // colgarse), así que aquí, al marcar/desmarcar un mes concreto, movemos el saldo directamente.
  const toggleFixedMonth = (id, monthIndex) => {
    const year = new Date().getFullYear();
    const key = `${year}-${String(monthIndex+1).padStart(2,'0')}`;
    const f = fixedExpenses.find(x=>x.id===id);
    if (!f) return;
    const wasPaid = (f.paidMonths||[]).includes(key);
    setFixedExpenses(list => list.map(x => {
      if (x.id !== id) return x;
      const has = (x.paidMonths||[]).includes(key);
      const paidMonths = has ? x.paidMonths.filter(k=>k!==key) : addPaidMonth(x.paidMonths, key);
      return {...x, paidMonths};
    }));
    if (f.accountId && !f.paymentDay) {
      applyBalanceDeltas([{ accountId: f.accountId, delta: wasPaid ? (f.monthlyValue||0) : -(f.monthlyValue||0) }]);
    }
  };
  const upsertProject = (item) => {
    setSavingsProjects(list => item.id ? list.map(d=>d.id===item.id? {...d,...item} : d) : [...list, {...item, id:uid()}]);
    setModal(null);
  };
  const upsertSplitRule = (item) => {
    setIncomeSplitRules(list => item.id ? list.map(d=>d.id===item.id? {...d,...item} : d) : [...list, {...item, id:uid()}]);
    setModal(null);
  };
  const upsertGoal = (item) => {
    setFinancialGoals(list => item.id
      ? list.map(d=>d.id===item.id? {...d,...item} : d)
      : [...list, {...item, id:uid(), startAmount: netWorth, startDate: todayISO()}]);
    setModal(null);
  };
  const upsertExtraIncome = (item) => {
    setExtraIncome(list => item.id ? list.map(d=>d.id===item.id? {...d,...item} : d) : [...list, {...item, id:uid()}]);
    setModal(null);
  };
  const upsertSaving = (item) => {
    const prev = item.id ? savingsEntries.find(x=>x.id===item.id) : null;
    setSavingsEntries(list => item.id ? list.map(d=>d.id===item.id? {...d,...item} : d) : [...list, {...item, id:uid()}]);
    applyBalanceDeltas([
      ...(prev ? [
        { accountId: prev.fromAccountId, delta: prev.amount },
        { accountId: prev.toAccountId,   delta: -prev.amount },
      ] : []),
      { accountId: item.fromAccountId, delta: -item.amount },
      { accountId: item.toAccountId,   delta: item.amount },
    ]);
    setModal(null);
  };
  const upsertTransfer = (item) => {
    const prev = item.id ? transfers.find(x=>x.id===item.id) : null;
    setTransfers(list => item.id ? list.map(t=>t.id===item.id? {...t,...item} : t) : [...list, {...item, id:uid()}]);
    applyBalanceDeltas([
      ...(prev ? [
        { accountId: prev.fromAccountId, delta: prev.amount },
        { accountId: prev.toAccountId,   delta: -prev.amount },
      ] : []),
      { accountId: item.fromAccountId, delta: -item.amount },
      { accountId: item.toAccountId,   delta: item.amount },
    ]);
    setModal(null);
  };

  // aplica una lista de {accountId, delta} a los saldos de una sola vez
  const applyBalanceDeltas = (deltas) => {
    const net = {};
    deltas.forEach(({accountId, delta}) => {
      if (!accountId || !delta) return;
      net[accountId] = (net[accountId] || 0) + delta;
    });
    if (Object.keys(net).length === 0) return;
    // los deltas vienen siempre en EUR (así se introducen entradas/hormiga/ahorro); si la cuenta
    // destino es en USD, convertimos antes de sumarlo a su saldo.
    setAccounts(list => list.map(a => net[a.id]
      ? {...a, balance: Math.round(((a.balance||0) + eurToAccountCurrency(net[a.id], a, exchangeRate))*100)/100}
      : a));
  };

  const upsertAccount = (item) => {
    setAccounts(list => item.id ? list.map(a=>a.id===item.id? {...a,...item} : a) : [...list, {...item, id:uid()}]);
    setModal(null);
  };
  const toggleAccountActive = (id) => setAccounts(l => l.map(a => a.id===id ? {...a, active: !a.active} : a));
  const toggleAccountInNet = (id) => setAccounts(l => l.map(a => a.id===id ? {...a, includeInNet: !a.includeInNet} : a));

  const upsertIncome = (item) => {
    const prev = item.id ? incomeEntries.find(x=>x.id===item.id) : null;
    setIncomeEntries(list => item.id ? list.map(d=>d.id===item.id? {...d,...item} : d) : [...list, {...item, id:uid()}]);
    // el dinero entra en la cuenta. Al editar, deshacemos lo anterior y aplicamos lo nuevo,
    // así cambiar el monto o la cuenta (o asignarla después) siempre cuadra.
    applyBalanceDeltas([
      ...(prev && prev.accountId ? [{ accountId: prev.accountId, delta: -prev.amount }] : []),
      ...(item.accountId ? [{ accountId: item.accountId, delta: item.amount }] : []),
    ]);
    setModal(null);
  };
  const upsertAnt = (item) => {
    const prev = item.id ? antExpenses.find(x=>x.id===item.id) : null;
    setAntExpenses(list => item.id ? list.map(d=>d.id===item.id? {...d,...item} : d) : [...list, {...item, id:uid()}]);
    applyBalanceDeltas([
      ...(prev && prev.accountId ? [{ accountId: prev.accountId, delta: prev.amount }] : []),
      ...(item.accountId ? [{ accountId: item.accountId, delta: -item.amount }] : []),
    ]);
    setModal(null);
  };
  const deleteItem = () => {
    if (!confirmDel) return;
    const { type, id } = confirmDel;
    if (type==='debt') setDebts(l=>l.filter(x=>x.id!==id));
    if (type==='sub') setSubscriptions(l=>l.filter(x=>x.id!==id));
    if (type==='fixed') setFixedExpenses(l=>l.filter(x=>x.id!==id));
    if (type==='project') setSavingsProjects(l=>l.filter(x=>x.id!==id));
    if (type==='splitRule') setIncomeSplitRules(l=>l.filter(x=>x.id!==id));
    if (type==='goal') setFinancialGoals(l=>l.filter(x=>x.id!==id));
    if (type==='extraIncome') setExtraIncome(l=>l.filter(x=>x.id!==id));
    if (type==='saving') {
      // revertir la transferencia: devolvemos el dinero a la cuenta de origen y lo quitamos de la de destino
      const entry = savingsEntries.find(x=>x.id===id);
      if (entry && (entry.fromAccountId || entry.toAccountId)) {
        applyBalanceDeltas([
          { accountId: entry.fromAccountId, delta: entry.amount },
          { accountId: entry.toAccountId, delta: -entry.amount },
        ]);
      }
      setSavingsEntries(l=>l.filter(x=>x.id!==id));
    }
    if (type==='income') {
      const entry = incomeEntries.find(x=>x.id===id);
      if (entry && entry.accountId) {
        applyBalanceDeltas([{ accountId: entry.accountId, delta: -entry.amount }]);
      }
      setIncomeEntries(l=>l.filter(x=>x.id!==id));
    }
    if (type==='ant') {
      const entry = antExpenses.find(x=>x.id===id);
      if (entry && entry.accountId) {
        applyBalanceDeltas([{ accountId: entry.accountId, delta: entry.amount }]);
      }
      setAntExpenses(l=>l.filter(x=>x.id!==id));
    }
    if (type==='transfer') {
      const t = transfers.find(x=>x.id===id);
      if (t) {
        applyBalanceDeltas([
          { accountId: t.fromAccountId, delta: t.amount },
          { accountId: t.toAccountId, delta: -t.amount },
        ]);
      }
      setTransfers(l=>l.filter(x=>x.id!==id));
    }
    if (type==='account') setAccounts(l=>l.filter(x=>x.id!==id));
    if (type==='appliedCharge') {
      const { key, accountId, amount } = confirmDel;
      if (amount>0 && accountId) {
        applyBalanceDeltas([{ accountId, delta: amount }]);
      }
      // dejamos ese mes marcado en 0 para siempre: no vuelve a descontarse, sin tocar el
      // progreso de cuotas/pagos de la deuda/suscripción/gasto en sí, solo la cuenta.
      setAppliedPayments(prev => (prev||[]).map(p => {
        const pp = typeof p === 'string' ? { key:p, accountId:null, amount:0 } : p;
        return pp.key===key ? {...pp, amount:0} : pp;
      }));
    }
    setConfirmDel(null);
  };
  const payInstallment = (id) => {
    setDebts(list => list.map(d => {
      if (d.id !== id || d.finished) return d;
      const paid = Math.min(d.paidInstallments+1, d.totalInstallments);
      const finished = paid >= d.totalInstallments;
      return { ...d, paidInstallments: paid, finished, finishedDate: finished ? todayISO() : null, lastInstallmentMarkedAt: todayISO() };
    }));
  };
  const undoInstallment = (id) => {
    setDebts(list => list.map(d => d.id===id ? { ...d, paidInstallments: Math.max(0,d.paidInstallments-1), finished:false, finishedDate:null, lastInstallmentMarkedAt:null } : d));
  };
  const finishDebt = (id) => {
    setDebts(list => list.map(d => d.id===id ? { ...d, finished:true, finishedDate: todayISO() } : d));
  };
  const toggleSubActive = (id) => setSubscriptions(l => l.map(s => s.id===id ? {...s, active: !s.active} : s));
  // las suscripciones ANUALES quedan totalmente fuera del motor automático (que solo sabe iterar
  // meses), así que igual que con los gastos fijos sin día, aquí se descuenta/devuelve directo.
  const markSubPaid = (id) => {
    const s = subscriptions.find(x=>x.id===id);
    if (!s) return;
    const isNewAnnualCycle = s.frequency==='annual' && !isPaidThisCycle(s);
    setSubscriptions(l => l.map(x => x.id===id ? {...x, lastPaid: todayISO(), paidMonths: addPaidMonth(x.paidMonths)} : x));
    if (isNewAnnualCycle && s.accountId) {
      applyBalanceDeltas([{ accountId: s.accountId, delta: -(s.annualPrice||0) }]);
    }
  };
  // deshacer: quitamos el mes actual de paidMonths y limpiamos lastPaid (así isPaidThisCycle vuelve a
  // dar false). El motor automático (duePayments) ve que ese mes ya no cuenta como pagado y devuelve
  // solo a la cuenta lo que de verdad se había descontado. Para anuales, como el motor ni las toca,
  // devolvemos el importe directamente aquí (espejo de markSubPaid).
  const undoSubPaid = (id) => {
    const s = subscriptions.find(x=>x.id===id);
    if (!s) return;
    const now = new Date();
    const key = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const wasPaidThisCycle = isPaidThisCycle(s);
    setSubscriptions(l => l.map(x => x.id===id ? {...x, lastPaid: null, paidMonths: (x.paidMonths||[]).filter(k=>k!==key)} : x));
    if (s.frequency==='annual' && wasPaidThisCycle && s.accountId) {
      applyBalanceDeltas([{ accountId: s.accountId, delta: (s.annualPrice||0) }]);
    }
  };
  // igual que toggleFixedMonth: los gastos fijos sin día fijo quedan fuera del motor automático,
  // así que "Marcar como pagado" descuenta el saldo directamente aquí (solo si es la primera vez
  // que se marca este mes, para no descontar dos veces si se hace clic más de una vez).
  const markFixedPaid = (id) => {
    const f = fixedExpenses.find(x=>x.id===id);
    if (!f) return;
    const now = new Date();
    const key = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const alreadyPaid = (f.paidMonths||[]).includes(key);
    setFixedExpenses(l => l.map(x => x.id===id ? {...x, lastPaid: todayISO(), paidMonths: addPaidMonth(x.paidMonths)} : x));
    if (!alreadyPaid && f.accountId && !f.paymentDay) {
      applyBalanceDeltas([{ accountId: f.accountId, delta: -(f.monthlyValue||0) }]);
    }
  };
  // deshacer: igual que undoSubPaid para el mes/lastPaid. Si el gasto fijo NO tiene día fijo, el motor
  // automático nunca lo tocó, así que aquí devolvemos el dinero directamente (espejo de markFixedPaid).
  const undoFixedPaid = (id) => {
    const f = fixedExpenses.find(x=>x.id===id);
    if (!f) return;
    const now = new Date();
    const key = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const wasPaid = (f.paidMonths||[]).includes(key);
    setFixedExpenses(l => l.map(x => x.id===id ? {...x, lastPaid: null, paidMonths: (x.paidMonths||[]).filter(k=>k!==key)} : x));
    if (wasPaid && f.accountId && !f.paymentDay) {
      applyBalanceDeltas([{ accountId: f.accountId, delta: (f.monthlyValue||0) }]);
    }
  };
  const markDebtCyclePaid = (id) => setDebts(l => l.map(d => d.id===id ? {...d, lastPaid: todayISO()} : d));

  /* ---------- cálculos derivados ---------- */
  const activeDebts = useMemo(()=> debts.filter(d=>!d.finished), [debts]);
  const finishedDebts = useMemo(()=> debts.filter(d=>d.finished), [debts]);
  const activeSubs = useMemo(()=> subscriptions.filter(s=>s.active), [subscriptions]);
  const installmentDebts = useMemo(()=> activeDebts.filter(d=>!d.noEndDate), [activeDebts]);
  const revolvingDebts = useMemo(()=> activeDebts.filter(d=>d.noEndDate), [activeDebts]);

  const totalDebtMonthly = useMemo(()=> activeDebts.filter(debtCountsThisMonth).reduce((a,d)=>a+d.monthlyPayment,0), [activeDebts]);
  const debtsNotStarted = useMemo(()=> activeDebts.filter(d=>!debtCountsThisMonth(d)), [activeDebts]);
  const totalDebtPending = useMemo(()=> installmentDebts.reduce((a,d)=>a+ (d.totalInstallments-effectivePaid(d))*d.monthlyPayment,0) + revolvingDebts.reduce((a,d)=>a+d.totalValue,0), [installmentDebts, revolvingDebts]);
  const totalSubMonthly = useMemo(()=> activeSubs.reduce((a,s)=> a + (s.frequency==='annual' ? (s.annualPrice||0)/12 : (s.monthlyPrice||0)), 0), [activeSubs]);
  const totalSubAnnual = useMemo(()=> activeSubs.reduce((a,s)=> a + (s.frequency==='annual' ? (s.annualPrice||0) : (s.monthlyPrice||0)*12), 0), [activeSubs]);
  // totales "reales" (sin mezclar mensual/anual) — esto es lo que se muestra en Suscripciones Y en el Dashboard/Comprometido
  const subsMonthlyReal = useMemo(()=> activeSubs.filter(s=>s.frequency!=='annual').reduce((a,s)=>a+(s.monthlyPrice||0),0), [activeSubs]);
  const subsAnnualReal = useMemo(()=> activeSubs.filter(s=>s.frequency==='annual').reduce((a,s)=>a+(s.annualPrice||0),0), [activeSubs]);
  const totalFixedMonthly = useMemo(()=> {
    const withDay = fixedExpenses.filter(f=>f.paymentDay && fixedCountsThisMonth(f)).reduce((a,f)=>a+f.monthlyValue,0);
    const noDayPaid = fixedExpenses.filter(f=>!f.paymentDay && isPaidThisCycle(f)).reduce((a,f)=>a+f.monthlyValue,0);
    return withDay + noDayPaid;
  }, [fixedExpenses]);
  const fixedWithDayCount = useMemo(()=> fixedExpenses.filter(f=>f.paymentDay).length, [fixedExpenses]);
  const fixedNoDayCount = useMemo(()=> fixedExpenses.filter(f=>!f.paymentDay && !isPaidThisCycle(f)).length, [fixedExpenses]);
  const fixedNoDayTotal = useMemo(()=> fixedExpenses.filter(f=>!f.paymentDay && !isPaidThisCycle(f)).reduce((a,f)=>a+f.monthlyValue,0), [fixedExpenses]);
  const totalCommitted = totalDebtMonthly + subsMonthlyReal + totalFixedMonthly;
  // total ahorrado = saldo de las cuentas vinculadas a proyectos + aportes que no fueron a ninguna cuenta
  // (así no contamos dos veces: el dinero que está en una cuenta se cuenta por el saldo, no por el aporte)
  const totalSaved = useMemo(()=> {
    const linkedIds = savingsProjects.filter(p=>p.accountId).map(p=>p.accountId);
    const inAccounts = accounts.filter(a=>linkedIds.includes(a.id)).reduce((s,a)=>s+accountBalanceInEur(a, exchangeRate),0);
    const loose = savingsEntries.filter(e=>!e.toAccountId).reduce((a,e)=>a+e.amount,0);
    return inAccounts + loose;
  }, [savingsEntries, savingsProjects, accounts, exchangeRate]);
  // valor neto: solo las cuentas que el usuario marcó para incluir
  /* ---------- motor: descontar de las cuentas los pagos ya pagados ---------- */
  // devuelve la lista de "pagos vigentes": cada ocurrencia pagada de algo vinculado a una cuenta
  const duePayments = useMemo(() => {
    const out = [];
    const now = new Date();
    const curIdx = now.getFullYear()*12 + now.getMonth();

    debts.forEach(d => {
      if (!d.accountId || d.finished) return;
      const first = new Date(d.firstPaymentDate);
      const firstIdx = first.getFullYear()*12 + first.getMonth();
      for (let idx = firstIdx; idx <= curIdx; idx++) {
        const y = Math.floor(idx/12), m = idx%12;
        if (isDebtPaidForOccurrence(d, y, m)) {
          out.push({ key:`debt:${d.id}:${y}-${String(m+1).padStart(2,'0')}`, accountId:d.accountId, amount:d.monthlyPayment,
                     type:'debt', name:d.name, emoji:d.emoji, date:new Date(y, m, clampDay(d.paymentDay,y,m)) });
        }
      }
    });

    subscriptions.forEach(s => {
      if (!s.accountId || !s.active || s.frequency==='annual') return;
      const start = s.startDate ? new Date(s.startDate) : now;
      const startIdx = Math.min(start.getFullYear()*12 + start.getMonth(), curIdx);
      for (let idx = startIdx; idx <= curIdx; idx++) {
        const y = Math.floor(idx/12), m = idx%12;
        const day = clampDay(s.billingDay, y, m);
        if (isRecurringPaidForOccurrence(s, y, m, day)) {
          out.push({ key:`sub:${s.id}:${y}-${String(m+1).padStart(2,'0')}`, accountId:s.accountId, amount:s.monthlyPrice,
                     type:'sub', name:s.name, emoji:s.emoji, date:new Date(y, m, day) });
        }
      }
    });

    fixedExpenses.forEach(f => {
      if (!f.accountId || !f.paymentDay) return;
      const start = f.startDate ? new Date(f.startDate) : now;
      const startIdx = Math.min(start.getFullYear()*12 + start.getMonth(), curIdx);
      for (let idx = startIdx; idx <= curIdx; idx++) {
        const y = Math.floor(idx/12), m = idx%12;
        if (isFixedPaidForMonth(f, y, m)) {
          out.push({ key:`fixed:${f.id}:${y}-${String(m+1).padStart(2,'0')}`, accountId:f.accountId, amount:f.monthlyValue,
                     type:'fixed', name:f.name, emoji:f.emoji, date:new Date(y, m, clampDay(f.paymentDay,y,m)) });
        }
      }
    });

    return out;
  }, [debts, subscriptions, fixedExpenses]);

  useEffect(() => {
    if (!loaded) return;

    // PRIMERA VEZ: tomamos una "foto" de lo que ya está pagado y lo damos por aplicado,
    // SIN tocar los saldos (amount 0). Así el historial pasado no te vacía las cuentas de golpe,
    // y si deshaces uno de esos, tampoco te devuelve un dinero que nunca se descontó.
    if (appliedPayments === null) {
      setAppliedPayments(duePayments.map(p => ({ key:p.key, accountId:p.accountId, amount:0 })));
      return;
    }

    // normalizamos por si vienen guardados como texto de una versión anterior
    const applied = appliedPayments.map(p => typeof p === 'string' ? { key:p, accountId:null, amount:0 } : p);
    const appliedKeys = new Set(applied.map(p=>p.key));
    const dueKeys = new Set(duePayments.map(p=>p.key));

    // corte: solo las ocurrencias de AYER en adelante mueven saldo de verdad.
    // esto cubre no solo la primera carga, sino también el caso de vincular una cuenta
    // (p. ej. Revolut) a una deuda/gasto/suscripción que ya arrastraba meses pagados:
    // esos meses pasados nunca deben descontarse de golpe al vincularla, solo cuentan
    // desde ayer hacia adelante, igual que ya se hace con la primera cuenta usada (N26).
    const cutoff = yesterdayStart();

    // pagos nuevos → se descuentan de la cuenta, pero solo si su fecha es de ayer en adelante;
    // los meses anteriores a eso quedan registrados como ya aplicados sin tocar el saldo (amount 0)
    const nuevos = duePayments
      .filter(p => !appliedKeys.has(p.key))
      .map(p => ({ ...p, appliedAmount: p.date < cutoff ? 0 : p.amount }));
    // pagos deshechos → se devuelve a la cuenta exactamente lo que se le había descontado
    const revertidos = applied.filter(p => !dueKeys.has(p.key) && p.amount > 0 && p.accountId);

    if (nuevos.length === 0 && revertidos.length === 0) return;

    setAccounts(list => list.map(a => {
      const salidas  = nuevos.filter(p=>p.accountId===a.id).reduce((s,p)=>s+(p.appliedAmount||0),0);
      const entradas = revertidos.filter(p=>p.accountId===a.id).reduce((s,p)=>s+(p.amount||0),0);
      const delta = entradas - salidas; // en EUR (deudas/suscripciones/gastos fijos siempre están en EUR)
      return delta ? {...a, balance: Math.round(((a.balance||0) + eurToAccountCurrency(delta, a, exchangeRate))*100)/100} : a;
    }));

    setAppliedPayments([
      // las entradas con importe 0 (meses pasados que ya decidimos que NUNCA mueven saldo) se
      // conservan SIEMPRE, incluso si el ítem se desvincula de la cuenta y se vuelve a vincular
      // más tarde. Si no se hiciera así, cada ciclo de "desvincular → vincular" las borra del
      // historial y, al volver a vincular, se re-evalúan como si fueran pagos nuevos — con la
      // mala suerte de que si ese re-cálculo no llega a guardarse a tiempo antes de recargar la
      // página, la próxima carga las trata otra vez como pendientes y sí las descuenta todas.
      ...applied.filter(p => p.amount === 0 || dueKeys.has(p.key)),
      ...nuevos.map(p => ({ key:p.key, accountId:p.accountId, amount:p.appliedAmount })),
    ]);
  }, [loaded, duePayments, appliedPayments]);

  const netWorth = useMemo(()=> accounts.filter(a=>a.active && a.includeInNet).reduce((a,x)=>a+accountBalanceInEur(x, exchangeRate),0), [accounts, exchangeRate]);
  // salud financiera: liquidez de TODAS las cuentas activas (no solo las del valor neto) entre los
  // gastos comprometidos al mes — cuántos meses aguantarías si dejaran de entrarte ingresos.
  const liquidezTotal = useMemo(()=> accounts.filter(a=>a.active).reduce((a,x)=>a+accountBalanceInEur(x, exchangeRate),0), [accounts, exchangeRate]);
  const accountsInNet = useMemo(()=> accounts.filter(a=>a.active && a.includeInNet).length, [accounts]);

  // si la cuenta que se estaba viendo como página completa se elimina, volvemos a la lista de cuentas
  useEffect(() => {
    if (view === 'accountDetail' && openAccountId && !accounts.find(a=>a.id===openAccountId)) {
      setView('accounts'); setOpenAccountId(null);
    }
  }, [view, openAccountId, accounts]);

  const now = new Date();
  // Tú registras el sueldo con la fecha del mes trabajado (ej. fechas de junio aunque te lo paguen en
  // julio). Para que "Flujo real de este mes" refleje el dinero que de verdad entra este mes, un
  // sueldo fechado el mes anterior cuenta como ingreso de ESTE mes (y ya no del suyo). Solo aplica
  // a la categoría "Sueldo" y solo para tu cuenta (el admin de la app), no para otros usuarios.
  const incomeCountsThisMonth = (e) => {
    if (isAdmin && e.category === 'Sueldo') {
      const prevMonth = new Date(now.getFullYear(), now.getMonth()-1, 1);
      return isSameMonth(e.date, prevMonth);
    }
    return isSameMonth(e.date, now);
  };
  const incomeThisMonth = useMemo(()=> incomeEntries.filter(incomeCountsThisMonth).reduce((a,e)=>a+e.amount,0), [incomeEntries, isAdmin]);
  const thisMonthKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const extraIncomeThisMonth = useMemo(()=> extraIncome.filter(e=>e.month===thisMonthKey), [extraIncome, thisMonthKey]);
  const extraIncomeThisMonthTotal = useMemo(()=> extraIncomeThisMonth.reduce((a,e)=>a+e.amount,0), [extraIncomeThisMonth]);
  // si hay un sueldo puesto a mano este mes, ese manda; si no, se usa el automático (de Entradas)
  const salaryOverrideThisMonth = salaryOverrides[thisMonthKey];
  const salaryForSplit = salaryOverrideThisMonth!==undefined ? salaryOverrideThisMonth : incomeThisMonth;
  const setSalaryOverrideThisMonth = (amount) => setSalaryOverrides(prev => ({...prev, [thisMonthKey]: amount}));
  const clearSalaryOverrideThisMonth = () => setSalaryOverrides(prev => { const next = {...prev}; delete next[thisMonthKey]; return next; });
  const incomeThisYear = useMemo(()=> incomeEntries.filter(e=>isSameYear(e.date, now)).reduce((a,e)=>a+e.amount,0), [incomeEntries]);
  const antThisMonth = useMemo(()=> antExpenses.filter(e=>isSameMonth(e.date, now)).reduce((a,e)=>a+e.amount,0), [antExpenses]);
  const antThisYear = useMemo(()=> antExpenses.filter(e=>isSameYear(e.date, now)).reduce((a,e)=>a+e.amount,0), [antExpenses]);
  const netFlowThisMonth = incomeThisMonth - totalCommitted - antThisMonth;

  // historial mensual: guarda una "foto" de cada mes para poder comparar tendencias
  useEffect(() => {
    if (!loaded) return;
    const now = new Date();
    const key = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const snapshot = {
      key,
      committed: Math.round(totalCommitted*100)/100,
      income: Math.round(incomeThisMonth*100)/100,
      ants: Math.round(antThisMonth*100)/100,
      net: Math.round(netFlowThisMonth*100)/100,
    };
    setMonthlyHistory(prev => {
      const existing = prev.find(h=>h.key===key);
      if (existing && existing.committed===snapshot.committed && existing.income===snapshot.income && existing.ants===snapshot.ants) return prev;
      return [...prev.filter(h=>h.key!==key), snapshot].sort((a,b)=>a.key.localeCompare(b.key));
    });
  }, [loaded, totalCommitted, incomeThisMonth, antThisMonth, netFlowThisMonth]);

  const monthsToFreedom = useMemo(()=> installmentDebts.length ? Math.max(...installmentDebts.map(d=>d.totalInstallments-effectivePaid(d))) : 0, [installmentDebts]);
  const freedomDate = useMemo(()=> monthsToFreedom ? addMonths(new Date(), monthsToFreedom) : null, [monthsToFreedom]);

  const distribution = useMemo(()=> [
    { name:'Deudas', value: totalDebtMonthly, color: COLORS.debt },
    { name:'Suscripciones', value: subsMonthlyReal, color: COLORS.sub },
    { name:'Gastos fijos', value: totalFixedMonthly, color: COLORS.fixed },
  ].filter(x=>x.value>0), [totalDebtMonthly, subsMonthlyReal, totalFixedMonthly]);

  // próximos pagos (14 días) combinando las 3 fuentes
  const upcoming = useMemo(() => {
    const rows = [];
    activeDebts.forEach(d => { const {date,daysUntil} = nextDebtOccurrence(d); rows.push({ id:d.id, type:'debt', name:d.name, emoji:d.emoji, amount:d.monthlyPayment, date, daysUntil, mode:d.mode, paidThisCycle: d.noEndDate ? isPaidThisCycle(d) : false }); });
    activeSubs.forEach(s => {
      const {date,daysUntil} = s.frequency==='annual' ? nextAnnualOccurrence(s.billingDate || todayISO()) : nextOccurrence(s.billingDay);
      rows.push({ id:s.id, type:'sub', name:s.name, emoji:s.emoji, amount: s.frequency==='annual' ? s.annualPrice : s.monthlyPrice, date, daysUntil, mode:s.mode, paidThisCycle: isPaidThisCycle(s) });
    });
    fixedExpenses.forEach(f => { if (!f.paymentDay) return; const {date,daysUntil} = nextOccurrence(f.paymentDay); rows.push({ id:f.id, type:'fixed', name:f.name, emoji:f.emoji, amount:f.monthlyValue, date, daysUntil, mode:f.mode, paidThisCycle: isPaidThisCycle(f) }); });
    return rows.filter(r=>r.daysUntil<=14).sort((a,b)=>a.daysUntil-b.daysUntil);
  }, [activeDebts, activeSubs, fixedExpenses]);

  // los recordatorios solo tienen sentido para lo que pagas tú manualmente y aún no has marcado como pagado
  const reminders = useMemo(()=> upcoming.filter(u=>u.daysUntil<=3 && u.mode!=='auto' && !u.paidThisCycle).map(u=>{
    if (u.daysUntil===0) return { key:u.id+'0', text: `Hoy se cobra ${u.name}.`, type:u.type };
    if (u.daysUntil===1) return { key:u.id+'1', text: u.type==='debt' ? `Mañana vence la cuota de ${u.name}.` : `Mañana se cobra ${u.name}.`, type:u.type };
    return { key:u.id+u.daysUntil, text: `En ${u.daysUntil} días vence ${u.name}.`, type:u.type };
  }), [upcoming]);

  // proyección a 12 meses
  const projection = useMemo(() => {
    const months = [];
    const now = new Date();
    const curIdx = now.getFullYear()*12 + now.getMonth();
    for (let i=0;i<12;i++) {
      const monthDate = addMonths(now, i);
      const installmentSum = installmentDebts.reduce((acc,d) => {
        const first = new Date(d.firstPaymentDate);
        const firstIdx = first.getFullYear()*12 + first.getMonth();
        const offset = (curIdx + i) - firstIdx; // índice (0-based) de la cuota en ese mes
        const applies = offset >= 0 && offset < d.totalInstallments;
        return acc + (applies ? d.monthlyPayment : 0);
      }, 0);
      const revolvingSum = revolvingDebts.reduce((acc,d) => {
        const first = new Date(d.firstPaymentDate);
        const firstIdx = first.getFullYear()*12 + first.getMonth();
        return acc + ((curIdx + i) >= firstIdx ? d.monthlyPayment : 0);
      }, 0);
      months.push({ mes: MESES[monthDate.getMonth()].slice(0,3), total: Math.round((installmentSum+revolvingSum+subsMonthlyReal+totalFixedMonthly)*100)/100 });
    }
    return months;
  }, [installmentDebts, revolvingDebts, subsMonthlyReal, totalFixedMonthly]);

  /* ---------- exportar ---------- */
  const buildRows = () => {
    const rows = [];
    debts.forEach(d => rows.push({ tipo:'Deuda', nombre:d.name, valor_mensual:d.monthlyPayment, valor_total:d.totalValue, cuotas: d.noEndDate ? 'Sin fecha límite' : `${effectivePaid(d)}/${d.totalInstallments}`, estado: d.finished?'Finalizada':'Activa', dia_pago:d.paymentDay }));
    subscriptions.forEach(s => rows.push({ tipo:'Suscripción', nombre:s.name, valor_mensual: s.frequency==='annual' ? (s.annualPrice||0)/12 : s.monthlyPrice, valor_total:s.frequency==='annual'?s.annualPrice:'', cuotas:'', estado:s.active?'Activa':'Cancelada', dia_pago:s.billingDay }));
    fixedExpenses.forEach(f => rows.push({ tipo:'Gasto fijo', nombre:f.name, valor_mensual:f.monthlyValue, valor_total:'', cuotas:'', estado:'Activa', dia_pago:f.paymentDay }));
    return rows;
  };
  const exportCSV = () => {
    const rows = buildRows();
    const headers = ['tipo','nombre','valor_mensual','valor_total','cuotas','estado','dia_pago'];
    const csv = [headers.join(';'), ...rows.map(r=>headers.map(h=>csvEscape(r[h])).join(';'))].join('\n');
    downloadBlob('\uFEFF'+csv, 'ledger_compromisos.csv', 'text/csv;charset=utf-8;');
  };
  const exportXLSX = () => {
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(debts.map(d=>({Nombre:d.name, ValorTotal:d.totalValue, CuotaMensual:d.monthlyPayment, CuotasTotales: d.noEndDate?'Sin fecha límite':d.totalInstallments, CuotasPagadas: d.noEndDate?'':effectivePaid(d), DiaPago:d.paymentDay, Estado:d.finished?'Finalizada':'Activa'}))), 'Deudas');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(subscriptions.map(s=>({Nombre:s.name, Frecuencia:s.frequency==='annual'?'Anual':'Mensual', PrecioMensual:s.monthlyPrice||'', PrecioAnual:s.annualPrice||'', DiaCobro:s.billingDay, FechaCobro:s.billingDate||'', Categoria:s.category, Estado:s.active?'Activa':'Cancelada'}))), 'Suscripciones');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(fixedExpenses.map(f=>({Nombre:f.name, ValorMensual:f.monthlyValue, DiaPago:f.paymentDay, Categoria:f.category}))), 'GastosFijos');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(savingsEntries.map(e=>({Monto:e.amount, Fecha:e.date, Proyecto: savingsProjects.find(p=>p.id===e.projectId)?.name || 'Sin destino', Nota:e.note||''}))), 'Ahorro');
    XLSX.writeFile(wb, 'ledger_compromisos.xlsx');
  };
  const exportPDF = () => window.print();

  /* ---------- búsqueda global ---------- */
  const searchResults = useMemo(() => {
    if (!globalSearch.trim()) return [];
    const q = globalSearch.toLowerCase();
    const rows = [];
    debts.forEach(d => d.name.toLowerCase().includes(q) && rows.push({type:'debt', item:d}));
    subscriptions.forEach(s => s.name.toLowerCase().includes(q) && rows.push({type:'sub', item:s}));
    fixedExpenses.forEach(f => f.name.toLowerCase().includes(q) && rows.push({type:'fixed', item:f}));
    savingsProjects.forEach(p => p.name.toLowerCase().includes(q) && rows.push({type:'project', item:p}));
    return rows;
  }, [globalSearch, debts, subscriptions, fixedExpenses, savingsProjects]);

  if (!loaded) {
    return <div className="min-h-screen bg-paper-100 dark:bg-ink-900 flex items-center justify-center dark:text-gray-500 font-mono text-sm">Cargando ledger…</div>;
  }

  const isDark = theme === 'dark';

  return (
    <div className={isDark ? 'dark' : 'light'}>
      {saveError && (
        <div className="fixed top-0 inset-x-0 z-[100] bg-red-500 text-white text-sm px-4 py-2.5 flex items-center gap-3 justify-center shadow-lg">
          <span className="font-medium">⚠️ No se guardaron tus últimos cambios:</span>
          <span className="font-mono opacity-90 truncate max-w-md">{saveError}</span>
          <button onClick={()=>setSaveError(null)} className="ml-2 underline shrink-0">Cerrar</button>
        </div>
      )}
      <div className="min-h-screen bg-paper-100 dark:bg-ink-900 text-gray-800 dark:text-gray-200 transition-colors">
        <div className="flex">
          {/* SIDEBAR */}
          <aside className={`no-print hidden md:flex flex-col ${sidebarOpen ? 'w-60' : 'w-[68px]'} shrink-0 h-screen sticky top-0 border-paper-300 dark:border-ink-500/60 bg-paper-200/70 dark:bg-ink-800/60 px-3 py-6 transition-all duration-200`}>
            <div className={`flex items-center mb-8 ${sidebarOpen ? 'justify-between px-2' : 'flex-col gap-2 px-0'}`}>
              <div className="flex items-center gap-2 min-w-0">

                {sidebarOpen && <span className="font-mono tracking-tight text-ink-900 dark:text-gray-100 font-semibold whitespace-nowrap">LEDGER<span className="text-gold-500">.</span></span>}
                {sidebarOpen && isAdmin && <span className="ml-1 text-[10px] font-mono uppercase tracking-wider text-gold-500 border border-gold-500/40 rounded-full px-1.5 py-0.5 shrink-0">Admin</span>}
              </div>
              <button onClick={()=>setSidebarOpen(o=>!o)} title={sidebarOpen ? 'Colapsar menú' : 'Expandir menú'}
                className="shrink-0 p-1.5 rounded-lg text-gray-500 hover:text-gold-500 hover:bg-paper-200/70 dark:hover:bg-ink-600/50 transition">
                {sidebarOpen ? <IChevL size={16}/> : <IChevR size={16}/>}
              </button>
            </div>
            <nav className="flex flex-col gap-1">
              <NavItem icon={<IHome size={18}/>} label="Dashboard" active={view==='dashboard'} onClick={()=>setView('dashboard')} collapsed={!sidebarOpen}/>
              <NavItem icon={<IBank size={18}/>} label="Cuentas" active={view==='accounts'||view==='accountDetail'} onClick={()=>setView('accounts')} count={accounts.length} collapsed={!sidebarOpen}/>
              <NavItem icon={<ICard size={18}/>} label="Deudas" active={view==='debts'} onClick={()=>setView('debts')} count={activeDebts.length} collapsed={!sidebarOpen}/>
              <NavItem icon={<IRepeat size={18}/>} label="Suscripciones" active={view==='subs'} onClick={()=>setView('subs')} count={activeSubs.length} collapsed={!sidebarOpen}/>
              <NavItem icon={<IReceipt size={18}/>} label="Gastos fijos" active={view==='fixed'} onClick={()=>setView('fixed')} count={fixedExpenses.length} collapsed={!sidebarOpen}/>
              <NavItem icon={<IPiggy size={18}/>} label="Ahorro" active={view==='savings'} onClick={()=>setView('savings')} count={savingsProjects.length} collapsed={!sidebarOpen}/>
              <NavItem icon={<IFlag size={18}/>} label="Metas" active={view==='goals'} onClick={()=>setView('goals')} count={financialGoals.length} collapsed={!sidebarOpen}/>
              <NavItem icon={<IArrowDown size={18}/>} label="Entradas" active={view==='income'} onClick={()=>setView('income')} collapsed={!sidebarOpen}/>
              <NavItem icon={<IDrop size={18}/>} label="Gastos hormiga" active={view==='ants'} onClick={()=>setView('ants')} collapsed={!sidebarOpen}/>
              <NavItem icon={<IPercent size={18}/>} label="Reparto de ingresos" active={view==='split'} onClick={()=>setView('split')} collapsed={!sidebarOpen}/>
              <NavItem icon={<IWand size={18}/>} label="Simulador" active={view==='simulator'} onClick={()=>setView('simulator')} collapsed={!sidebarOpen}/>
              <NavItem icon={<IRepeat size={18}/>} label="Transferencias" active={view==='transfers'} onClick={()=>setView('transfers')} count={transfers.length} collapsed={!sidebarOpen}/>
              <NavItem icon={<ICalendar size={18}/>} label="Calendario" active={view==='calendar'} onClick={()=>setView('calendar')} collapsed={!sidebarOpen}/>
              <NavItem icon={<IChart size={18}/>} label="Estadísticas" active={view==='stats'} onClick={()=>setView('stats')} collapsed={!sidebarOpen}/>
              <NavItem icon={<IArchive size={18}/>} label="Historial" active={view==='history'} onClick={()=>setView('history')} count={finishedDebts.length} collapsed={!sidebarOpen}/>
            </nav>
            <div className={`mt-auto flex flex-col gap-3 ${sidebarOpen ? 'px-2' : 'items-center px-0'}`}>
              {sidebarOpen ? (
                <>

              {onLogout && sidebarOpen && (

              )}
            </div>
          </aside>

          {/* CONTENIDO */}
          <div className="flex-1 min-w-0">
            {/* TOP BAR */}
            <header className="no-print sticky top-0 z-30 backdrop-blur bg-paper-100/85 dark:bg-ink-900/85 border-paper-300/80 dark:border-ink-500/40 px-4 md:px-8 py-3.5 flex items-center gap-3">
              <div className="md:hidden flex items-center gap-2 mr-1">
                <div className="w-7 h-7 rounded-md bg-gold-500 flex items-center justify-center font-mono font-bold text-sm">L</div>
              </div>
              {view==='accountDetail' && (
                <button onClick={()=>{setView('accounts'); setOpenAccountId(null);}}

                  <IChevL size={18}/>
                </button>
              )}
              <h1 className="font-medium text-gray-500 dark:text-gray-400 capitalize truncate hidden md:block">
                {view==='accountDetail'
                  ? (() => { const acc = accounts.find(a=>a.id===openAccountId); return acc ? `${acc.emoji} ${acc.name}` : 'Cuenta'; })()
                  : viewTitle(view)}
              </h1>
              <div className="flex-1"/>
              <div className="relative">
                <button onClick={()=>setSearchOpen(s=>!s)} className="w-9 h-9 rounded-lg flex items-center justify-center text-gray-500 hover:text-ink-900 dark:hover:text-gray-100 hover:bg-paper-200/70 dark:hover:bg-ink-600/60 transition">

                {searchOpen && (
                  <div className="absolute right-0 mt-2 w-80 bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500 rounded-xl shadow-soft p-3 animate-popin z-40">
                    <input autoFocus value={globalSearch} onChange={e=>setGlobalSearch(e.target.value)}
                      placeholder="Buscar deuda, suscripción, proyecto…" className={inputCls} />
                    <div className="mt-2 max-h-64 overflow-y-auto flex flex-col gap-1">
                      {searchResults.map((r,i)=>(
                        <div key={i} className="flex items-center gap-2 px-2 py-1.5 rounded-lg hover:bg-paper-200/70 dark:hover:bg-ink-600/60 text-sm">
                          <span>{r.item.emoji}</span>
                          <span className="flex-1 truncate">{r.item.name}</span>
                          <span className="uppercase text-gray-500 dark:text-gray-500">{r.type==='debt'?'Deuda':r.type==='sub'?'Suscripción':r.type==='project'?'Proyecto':'Fijo'}</span>
                        </div>
                      ))}
                      {globalSearch && !searchResults.length && <div className="text-gray-500 dark:text-gray-500 px-2 py-2">Sin resultados.</div>}
                    </div>
                  </div>
                )}
              </div>
              <button onClick={toggleTheme} className="w-9 h-9 rounded-lg flex items-center justify-center text-gray-500 hover:text-ink-900 dark:hover:text-gray-100 hover:bg-paper-200/70 dark:hover:bg-ink-600/60 transition">
                {isDark ? <ISun size={18}/> : <IMoon size={18}/>}
              </button>
              <div className="relative group">
                <button className="w-9 h-9 rounded-lg flex items-center justify-center text-gray-500 hover:text-ink-900 dark:hover:text-gray-100 hover:bg-paper-200/70 dark:hover:bg-ink-600/60 transition"><IDownload size={18}/></button>
                <div className="absolute right-0 mt-1 w-44 bg-white dark:bg-ink-700 border border-paper-300 dark:border-ink-500 rounded-xl shadow-soft p-1.5 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition z-40">
                  <button onClick={exportCSV} className="w-full px-3 py-2 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-paper-200 dark:hover:bg-ink-600">Exportar CSV</button>
                  <button onClick={exportXLSX} className="w-full px-3 py-2 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-paper-200 dark:hover:bg-ink-600">Exportar Excel</button>
                  <button onClick={exportPDF} className="w-full px-3 py-2 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-paper-200 dark:hover:bg-ink-600">Exportar PDF</button>
                </div>
              </div>
              <AddButton view={view} onAdd={(type)=>setModal({type})} />
            </header>

            <main className="p-4 md:p-8 pb-24 md:pb-8 max-w-6xl mx-auto">
              {view==='dashboard' && (
                <Dashboard
                  totalCommitted={totalCommitted} totalDebtMonthly={totalDebtMonthly} totalDebtPending={totalDebtPending}
                  totalSubMonthly={subsMonthlyReal} totalFixedMonthly={totalFixedMonthly} totalSaved={totalSaved}
                  monthsToFreedom={monthsToFreedom} freedomDate={freedomDate}
                  distribution={distribution} upcoming={upcoming} reminders={reminders}
                  activeDebtsCount={activeDebts.length}
                  incomeThisMonth={incomeThisMonth} antThisMonth={antThisMonth} netFlowThisMonth={netFlowThisMonth}
                  hasIncomeData={incomeEntries.length>0}
                  netWorth={netWorth} hasAccounts={accounts.length>0}
                />
              )}
              {view==='accounts' && (
                <AccountsView accounts={accounts} netWorth={netWorth} accountsInNet={accountsInNet}
                  debts={debts} subs={subscriptions} fixed={fixedExpenses}
                  exchangeRate={exchangeRate} onSetExchangeRate={setExchangeRate}
                  onAdd={()=>setModal({type:'account'})} onEdit={(a)=>setModal({type:'account', item:a})}
                  onDelete={(a)=>setConfirmDel({type:'account', id:a.id, name:a.name})}
                  onOpen={(a)=>{setOpenAccountId(a.id); setView('accountDetail');}}
                  onToggleActive={toggleAccountActive} onToggleInNet={toggleAccountInNet}/>
              )}
              {view==='accountDetail' && openAccountId && (() => {
                const acc = accounts.find(a=>a.id===openAccountId);
                if (!acc) return null;
                return (
                  <AccountDetail account={acc} accounts={accounts} savingsEntries={savingsEntries} incomeEntries={incomeEntries} antExpenses={antExpenses} transferList={transfers} duePayments={duePayments} appliedPayments={appliedPayments} exchangeRate={exchangeRate}
                    debts={debts} subs={subscriptions} fixed={fixedExpenses} projects={savingsProjects}
                    onEditSaving={(e)=>setModal({type:'saving', item:e})}
                    onDeleteSaving={(e)=>setConfirmDel({type:'saving', id:e.id, name:fmt(e.amount)})}
                    onEditIncome={(e)=>setModal({type:'income', item:e})}
                    onDeleteIncome={(e)=>setConfirmDel({type:'income', id:e.id, name:fmt(e.amount)})}
                    onEditAnt={(e)=>setModal({type:'ant', item:e})}
                    onDeleteAnt={(e)=>setConfirmDel({type:'ant', id:e.id, name:fmt(e.amount)})}
                    onEditTransfer={(t)=>setModal({type:'transfer', item:t})}
                    onDeleteTransfer={(t)=>setConfirmDel({type:'transfer', id:t.id, name:fmt(t.amount)})}
                    onEditDebt={(d)=>setModal({type:'debt', item:d})}
                    onDeleteDebt={(d)=>setConfirmDel({type:'debt', id:d.id, name:d.name})}
                    onEditSub={(s)=>setModal({type:'sub', item:s})}
                    onDeleteSub={(s)=>setConfirmDel({type:'sub', id:s.id, name:s.name})}
                    onEditFixed={(f)=>setModal({type:'fixed', item:f})}
                    onDeleteFixed={(f)=>setConfirmDel({type:'fixed', id:f.id, name:f.name})}
                    onCancelCharge={(c)=>setConfirmDel({type:'appliedCharge', ...c})}
                    onClose={()=>{setView('accounts'); setOpenAccountId(null);}}/>
                );
              })()}
              {view==='debts' && (
                <DebtsView debts={debts} accounts={accounts} onAdd={()=>setModal({type:'debt'})} onEdit={(d)=>setModal({type:'debt', item:d})}
                  onDelete={(d)=>setConfirmDel({type:'debt', id:d.id, name:d.name})} onPay={payInstallment} onUndo={undoInstallment} onFinish={finishDebt} onMarkCyclePaid={markDebtCyclePaid}
                  totalMonthly={totalDebtMonthly} activeCount={activeDebts.length} notStarted={debtsNotStarted}/>
              )}
              {view==='subs' && (
                <SubsView subs={subscriptions} accounts={accounts} onAdd={()=>setModal({type:'sub'})} onEdit={(s)=>setModal({type:'sub', item:s})}
                  onDelete={(s)=>setConfirmDel({type:'sub', id:s.id, name:s.name})} onToggle={toggleSubActive} onMarkPaid={markSubPaid} onUndo={undoSubPaid}
                  totalMonthly={subsMonthlyReal} totalAnnual={subsAnnualReal}/>
              )}
              {view==='fixed' && (
                <FixedView items={fixedExpenses} accounts={accounts} onAdd={()=>setModal({type:'fixed'})} onEdit={(f)=>setModal({type:'fixed', item:f})}
                  onDelete={(f)=>setConfirmDel({type:'fixed', id:f.id, name:f.name})} onMarkPaid={markFixedPaid} onUndo={undoFixedPaid} onToggleMonth={toggleFixedMonth} totalMonthly={totalFixedMonthly}
                  withDayCount={fixedWithDayCount} noDayCount={fixedNoDayCount} noDayTotal={fixedNoDayTotal}/>
              )}
              {view==='savings' && (
                <SavingsView projects={savingsProjects} entries={savingsEntries} accounts={accounts} totalSaved={totalSaved}
                  onAddProject={()=>setModal({type:'project'})} onEditProject={(p)=>setModal({type:'project', item:p})}
                  onDeleteProject={(p)=>setConfirmDel({type:'project', id:p.id, name:p.name})}
                  onAddEntry={()=>setModal({type:'saving'})} onEditEntry={(e)=>setModal({type:'saving', item:e})}
                  onDeleteEntry={(e)=>setConfirmDel({type:'saving', id:e.id, name:fmt(e.amount)})}/>
              )}
              {view==='goals' && (
                <GoalsView goals={financialGoals} netWorth={netWorth} netFlowThisMonth={netFlowThisMonth}
                  onAdd={()=>setModal({type:'goal'})} onEdit={(g)=>setModal({type:'goal', item:g})}
                  onDelete={(g)=>setConfirmDel({type:'goal', id:g.id, name:g.name})}/>
              )}
              {view==='income' && (
                <IncomeView entries={incomeEntries} thisMonth={incomeThisMonth} thisYear={incomeThisYear}
                  expected={expectedIncome} onSetExpected={setExpectedIncome}
                  totalCommitted={totalCommitted} antThisMonth={antThisMonth} antExpenses={antExpenses}
                  onAdd={()=>setModal({type:'income'})} onEdit={(e)=>setModal({type:'income', item:e})}
                  onDelete={(e)=>setConfirmDel({type:'income', id:e.id, name:fmt(e.amount)})}/>
              )}
              {view==='ants' && (
                <AntExpensesView entries={antExpenses} thisMonth={antThisMonth} thisYear={antThisYear}
                  budget={antBudget} onSetBudget={setAntBudget}
                  onAdd={()=>setModal({type:'ant'})} onEdit={(e)=>setModal({type:'ant', item:e})}
                  onDelete={(e)=>setConfirmDel({type:'ant', id:e.id, name:fmt(e.amount)})}/>
              )}
              {view==='split' && (
                <SplitView rules={incomeSplitRules} accounts={accounts} incomeAuto={incomeThisMonth} salaryOverride={salaryOverrideThisMonth} salaryForSplit={salaryForSplit}

                  extraIncome={extraIncomeThisMonth} extraIncomeTotal={extraIncomeThisMonthTotal}
                  liquidezTotal={liquidezTotal} gastosMensuales={totalCommitted}
                  onAdd={()=>setModal({type:'splitRule'})} onEdit={(r)=>setModal({type:'splitRule', item:r})}
                  onDelete={(r)=>setConfirmDel({type:'splitRule', id:r.id, name:r.name})}
                  onAddExtraIncome={()=>setModal({type:'extraIncome'})} onEditExtraIncome={(e)=>setModal({type:'extraIncome', item:e})}
                  onDeleteExtraIncome={(e)=>setConfirmDel({type:'extraIncome', id:e.id, name:`${e.name} (${fmt(e.amount)})`})}/>

              {view==='simulator' && (
                <SimulatorView debts={activeDebts.filter(d=>!d.noEndDate)} incomeThisMonth={incomeThisMonth} totalCommitted={totalCommitted}
                  antThisMonth={antThisMonth} netFlowThisMonth={netFlowThisMonth} liquidezTotal={liquidezTotal}/>
              )}
              {view==='transfers' && (
                <TransfersView items={transfers} accounts={accounts}
                  onAdd={()=>setModal({type:'transfer'})} onEdit={(t)=>setModal({type:'transfer', item:t})}
                  onDelete={(t)=>setConfirmDel({type:'transfer', id:t.id, name:fmt(t.amount)})}/>
              )}
              {view==='calendar' && (

        {modal?.type==='sub' && <Modal title={modal.item? 'Editar suscripción':'Nueva suscripción'} onClose={()=>setModal(null)}><SubscriptionForm initial={modal.item} accounts={accounts} onSave={upsertSub} onClose={()=>setModal(null)}/></Modal>}
        {modal?.type==='fixed' && <Modal title={modal.item? 'Editar gasto fijo':'Nuevo gasto fijo'} onClose={()=>setModal(null)}><FixedForm initial={modal.item} accounts={accounts} onSave={upsertFixed} onClose={()=>setModal(null)}/></Modal>}
        {modal?.type==='project' && <Modal title={modal.item? 'Editar proyecto':'Nuevo proyecto de ahorro'} onClose={()=>setModal(null)}><SavingsProjectForm initial={modal.item} accounts={accounts} onSave={upsertProject} onClose={()=>setModal(null)}/></Modal>}
        {modal?.type==='goal' && <Modal title={modal.item? 'Editar meta':'Nueva meta financiera'} onClose={()=>setModal(null)}><GoalForm initial={modal.item} netWorth={netWorth} onSave={upsertGoal} onClose={()=>setModal(null)}/></Modal>}
        {modal?.type==='extraIncome' && <Modal title={modal.item? 'Editar ingreso':'Añadir ingreso de este mes'} onClose={()=>setModal(null)}><ExtraIncomeForm initial={modal.item} onSave={upsertExtraIncome} onClose={()=>setModal(null)}/></Modal>}
        {modal?.type==='saving' && <Modal title={modal.item? 'Editar ahorro':'Nuevo ahorro'} onClose={()=>setModal(null)}><SavingsEntryForm initial={modal.item} projects={savingsProjects} accounts={accounts} onSave={upsertSaving} onClose={()=>setModal(null)}/></Modal>}
        {modal?.type==='account' && <Modal title={modal.item? 'Editar cuenta':'Nueva cuenta'} onClose={()=>setModal(null)}><AccountForm initial={modal.item} onSave={upsertAccount} onClose={()=>setModal(null)}/></Modal>}
        {modal?.type==='income' && <Modal title={modal.item? 'Editar entrada':'Nueva entrada'} onClose={()=>setModal(null)}><IncomeForm initial={modal.item} accounts={accounts} onSave={upsertIncome} onClose={()=>setModal(null)}/></Modal>}
        {modal?.type==='ant' && <Modal title={modal.item? 'Editar gasto hormiga':'Nuevo gasto hormiga'} onClose={()=>setModal(null)}><AntExpenseForm initial={modal.item} accounts={accounts} onSave={upsertAnt} onClose={()=>setModal(null)}/></Modal>}
        {modal?.type==='splitRule' && (() => {
          const usedPercent = incomeSplitRules.filter(r=>!modal.item || r.id!==modal.item.id).reduce((s,r)=>s+(r.percent||0),0);
          return (
            <Modal title={modal.item? 'Editar regla de reparto':'Nueva regla de reparto'} onClose={()=>setModal(null)}>
              <SplitRuleForm initial={modal.item} accounts={accounts} usedPercent={usedPercent} onSave={upsertSplitRule} onClose={()=>setModal(null)}/>
            </Modal>
          );
        })()}
        {modal?.type==='transfer' && <Modal title={modal.item? 'Editar transferencia':'Nueva transferencia'} onClose={()=>setModal(null)}><TransferForm initial={modal.item} accounts={accounts} onSave={upsertTransfer} onClose={()=>setModal(null)}/></Modal>}
        {confirmDel && <ConfirmDialog
          text={confirmDel.type==='saving'
            ? `Esto eliminará el aporte de ${confirmDel.name} y devolverá los saldos de las cuentas a como estaban antes de la transferencia.`
            : confirmDel.type==='appliedCharge'
            ? `Esto devolverá ${fmt(confirmDel.amount)} a la cuenta y marcará ese cargo (${confirmDel.name}) como que nunca se descontó. No afecta el progreso de cuotas ni el historial de pagos del ítem, solo el saldo de la cuenta.`
            : `Esto eliminará "${confirmDel.name}" de forma permanente.`}
          onConfirm={deleteItem} onCancel={()=>setConfirmDel(null)}/>}
      </div>
    </div>
  );
}

function viewTitle(v) {
  return { dashboard:'Dashboard', accounts:'Cuentas', debts:'Deudas', subs:'Suscripciones', fixed:'Gastos fijos', savings:'Ahorro', goals:'Metas', income:'Entradas', ants:'Gastos hormiga', split:'Reparto de ingresos', simulator:'Simulador', transfers:'Transferencias', calendar:'Calendario', stats:'Estadísticas', history:'Historial' }[v] || '';
}

  return (

      ${active ? 'bg-gold-500/15 text-gold-500 font-medium' : 'text-gray-500 dark:text-gray-400 hover:text-ink-900 dark:hover:text-gray-100 hover:bg-paper-200/60 dark:hover:bg-ink-600/50'}`}>

function AddButton({ view, onAdd }) {
